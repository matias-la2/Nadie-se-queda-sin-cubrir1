<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesores — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/profesores.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Profesores</h1>
        <p>Consulta el estado de los profesores del centro.</p>
      </div>
    </div>

    <!-- Tarjetas resumen -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-activos">
            <i class="bi bi-person-check"></i>
          </div>
          <div>
            <div class="etiqueta">Activos</div>
            <div class="numero" id="num-activos">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-inactivos">
            <i class="bi bi-person-x"></i>
          </div>
          <div>
            <div class="etiqueta">Inactivos</div>
            <div class="numero" id="num-inactivos">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-total-prof">
            <i class="bi bi-people"></i>
          </div>
          <div>
            <div class="etiqueta">Total Profesores</div>
            <div class="numero" id="num-total">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-departamentos">
            <i class="bi bi-diagram-3"></i>
          </div>
          <div>
            <div class="etiqueta">Departamentos</div>
            <div class="numero" id="num-departamentos">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabla con filtros -->
    <div class="tarjeta">

      <div class="barra-acciones">
        <input
          type="text"
          class="input-busqueda"
          id="input-busqueda"
          placeholder="Buscar por nombre o correo..."
        >
        <select class="select-filtro" id="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>

      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Profesor</th>
              <th>Correo electrónico</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <div class="contador-profesores" id="contador-texto">
        Mostrando 0 profesores
      </div>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("profesores", "../../");
      actualizarResumen();
      cargarProfesores();

      document.getElementById("filtro-estado").addEventListener("change", function () { cargarProfesores(); });

      var timerBusqueda;
      document.getElementById("input-busqueda").addEventListener("input", function () {
        clearTimeout(timerBusqueda);
        timerBusqueda = setTimeout(function () { cargarProfesores(); }, 300);
      });
    });

    function actualizarResumen() {
      apiFetch('/api/v1/usuarios?rol=PROFESOR&activo=true&limit=1').then(function (d) {
        document.getElementById("num-activos").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-activos").textContent = "0"; });

      apiFetch('/api/v1/usuarios?rol=PROFESOR&activo=false&limit=1').then(function (d) {
        document.getElementById("num-inactivos").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-inactivos").textContent = "0"; });

      apiFetch('/api/v1/usuarios?rol=PROFESOR&limit=1').then(function (d) {
        document.getElementById("num-total").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-total").textContent = "0"; });
    }

    function cargarProfesores() {
      var busqueda = document.getElementById("input-busqueda").value.trim();
      var activo = document.getElementById("filtro-estado").value;

      var url = '/api/v1/usuarios?limit=200&rol=PROFESOR';
      if (busqueda) url += '&busqueda=' + encodeURIComponent(busqueda);
      if (activo) url += '&activo=' + encodeURIComponent(activo);

      apiFetch(url).then(function (data) {
        var tbody = document.getElementById("tabla-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];
        var pag = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion : { total: 0 };

        document.getElementById("contador-texto").textContent =
          "Mostrando " + filas.length + " de " + pag.total + " profesores";

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No se encontraron profesores</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var u = filas[i];
          var nombreCompleto = (u.nombre || "") + " " + (u.apellidos || "");
          var avatarSrc = u.avatar_url || "https://ui-avatars.com/api/?name=" + encodeURIComponent(nombreCompleto.trim()) + "&background=dbeafe&color=1152d4&bold=true";

          var badgeEstado;
          if (u.activo) {
            badgeEstado = '<span class="badge-estado badge-cubierta"><i class="bi bi-circle-fill me-1 icono-status-mini"></i>Activo</span>';
          } else {
            badgeEstado = '<span class="badge-estado badge-cerrada"><i class="bi bi-circle me-1 icono-status-mini"></i>Inactivo</span>';
          }

          var clasePeligro = u.activo ? " peligro" : "";
          var tituloToggle = u.activo ? "Desactivar" : "Activar";
          var iconoToggle = u.activo ? "bi-person-slash" : "bi-person-check";

          html += '<tr>' +
                    '<td><div class="celda-profesor">' +
                      '<img src="' + avatarSrc + '" class="avatar-profesor" alt="">' +
                      '<div><div class="profesor-nombre">' + nombreCompleto.trim() + '</div><div class="profesor-id">ID: ' + String(u.id_usuario).padStart(4, "0") + '</div></div>' +
                    '</div></td>' +
                    '<td class="celda-sm">' + (u.correo || "—") + '</td>' +
                    '<td>' + badgeEstado + '</td>' +
                    '<td>' +
                      '<button class="btn-accion' + clasePeligro + '" title="' + tituloToggle + '" onclick="toggleActivo(' + u.id_usuario + ', \'' + nombreCompleto.trim().replace(/'/g, "\\'") + '\', ' + (u.activo ? 'true' : 'false') + ')"><i class="bi ' + iconoToggle + '"></i></button>' +
                    '</td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-body").innerHTML =
          '<tr><td colspan="4" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No se encontraron profesores</td></tr>';
        document.getElementById("contador-texto").textContent = "Mostrando 0 profesores";
      });
    }

    function toggleActivo(id, nombre, estaActivo) {
      var accion = estaActivo ? "desactivar" : "activar";
      if (!confirm("¿Quieres " + accion + " a " + nombre + "?")) return;

      apiFetch('/api/v1/usuarios/' + id + '/toggle-activo', {
        method: 'PATCH'
      }).then(function (data) {
        if (data && data.ok) {
          actualizarResumen();
          cargarProfesores();
        } else {
          alert((data && data.mensaje) || "Error al cambiar estado");
        }
      }).catch(function () { alert("Error de conexión"); });
    }
  </script>

</body>
</html>
