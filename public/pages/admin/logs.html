<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log de Actividad — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/profesores.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <div class="pagina-header">
      <h1>Log de Actividad</h1>
      <p>Historial de acciones realizadas en el sistema.</p>
    </div>

    <div class="tarjeta">

      <div class="barra-acciones">
        <input type="text" class="input-busqueda" id="input-accion" placeholder="Filtrar por acción...">
        <input type="date" class="input-busqueda" id="input-fecha-desde" title="Fecha desde" style="max-width:160px;">
        <input type="date" class="input-busqueda" id="input-fecha-hasta" title="Fecha hasta" style="max-width:160px;">
        <button class="btn-primario" onclick="cargarLogs()" style="white-space:nowrap;">
          <i class="bi bi-search"></i> Filtrar
        </button>
      </div>

      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Usuario</th>
              <th>Acción</th>
              <th>Entidad</th>
              <th>Detalles</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <div class="contador-profesores" id="contador-texto">
        Mostrando 0 registros
      </div>

      <div class="d-flex justify-content-center gap-2 mt-3" id="paginacion"></div>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    var _paginaActual = 1;

    verificarSesion().then(function (usuario) {
      if (!usuario) return;
      crearSidebar("logs", "../../");
      cargarLogs();
    });

    function cargarLogs(pagina) {
      _paginaActual = pagina || 1;
      var accion = document.getElementById("input-accion").value.trim();
      var fechaDesde = document.getElementById("input-fecha-desde").value;
      var fechaHasta = document.getElementById("input-fecha-hasta").value;

      var url = '/api/v1/usuarios/logs?limit=25&page=' + _paginaActual;
      if (accion) url += '&accion=' + encodeURIComponent(accion);
      if (fechaDesde) url += '&fecha_desde=' + encodeURIComponent(fechaDesde);
      if (fechaHasta) url += '&fecha_hasta=' + encodeURIComponent(fechaHasta);

      apiFetch(url).then(function (data) {
        var tbody = document.getElementById("tabla-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];
        var pag = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion : { total: 0, paginas: 1, pagina: 1 };

        document.getElementById("contador-texto").textContent =
          "Mostrando " + filas.length + " de " + pag.total + " registros";

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No hay registros en el log</td></tr>';
          document.getElementById("paginacion").innerHTML = "";
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var log = filas[i];
          var fecha = "";
          if (log.created_at) {
            var d = new Date(log.created_at);
            fecha = String(d.getDate()).padStart(2, "0") + "/" +
                    String(d.getMonth() + 1).padStart(2, "0") + "/" +
                    d.getFullYear() + " " +
                    String(d.getHours()).padStart(2, "0") + ":" +
                    String(d.getMinutes()).padStart(2, "0");
          }

          var usuario = (log.usuario_nombre || "") + " " + (log.usuario_apellidos || "");
          usuario = usuario.trim() || "Sistema";

          var accionLabel = (log.accion || "").replace(/_/g, " ");
          var entidad = log.tabla_afectada || "—";
          var idReg = log.registro_id ? " #" + log.registro_id : "";

          var detalles = "—";
          if (log.datos_extra) {
            try {
              var extra = typeof log.datos_extra === "string" ? JSON.parse(log.datos_extra) : log.datos_extra;
              var claves = Object.keys(extra);
              if (claves.length > 0) {
                detalles = "";
                for (var j = 0; j < Math.min(claves.length, 3); j++) {
                  detalles += claves[j] + ": " + String(extra[claves[j]]).substring(0, 30) + "; ";
                }
                if (claves.length > 3) detalles += "...";
              }
            } catch (_e) { detalles = "—"; }
          }

          html += '<tr>' +
                    '<td class="celda-fecha-gris" style="white-space:nowrap;">' + fecha + '</td>' +
                    '<td class="celda-sm">' + usuario + '</td>' +
                    '<td><span class="badge-tipo">' + accionLabel + '</span></td>' +
                    '<td class="celda-sm">' + entidad + idReg + '</td>' +
                    '<td class="celda-sm" style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;">' + detalles + '</td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;

        var htmlPag = "";
        if (pag.paginas > 1) {
          if (_paginaActual > 1) {
            htmlPag += '<button class="btn-secundario" onclick="cargarLogs(' + (_paginaActual - 1) + ')"><i class="bi bi-chevron-left"></i></button>';
          }
          htmlPag += '<span style="padding:6px 12px;font-size:13px;color:#64748b;">' + _paginaActual + ' / ' + pag.paginas + '</span>';
          if (_paginaActual < pag.paginas) {
            htmlPag += '<button class="btn-secundario" onclick="cargarLogs(' + (_paginaActual + 1) + ')"><i class="bi bi-chevron-right"></i></button>';
          }
        }
        document.getElementById("paginacion").innerHTML = htmlPag;

      }).catch(function () {
        document.getElementById("tabla-body").innerHTML =
          '<tr><td colspan="5" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>Error al cargar logs</td></tr>';
        document.getElementById("contador-texto").textContent = "Mostrando 0 registros";
      });
    }
  </script>

</body>
</html>
