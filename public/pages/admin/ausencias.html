<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Ausencias — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/ausencias.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Gestión Global de Ausencias</h1>
        <p>Visualiza y administra todas las ausencias del profesorado.</p>
      </div>
      <a href="../../pages/compartido/nueva-ausencia.html" class="btn-primario">
        <i class="bi bi-plus-lg"></i>
        Nueva Ausencia
      </a>
    </div>

    <!-- Tarjetas resumen -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-pendiente">
            <i class="bi bi-hourglass-split"></i>
          </div>
          <div>
            <div class="etiqueta">Pendientes</div>
            <div class="numero" id="num-pendientes">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-cubierta-aus">
            <i class="bi bi-check-circle"></i>
          </div>
          <div>
            <div class="etiqueta">Cubiertas</div>
            <div class="numero" id="num-cubiertas">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-sin-cubrir">
            <i class="bi bi-x-circle"></i>
          </div>
          <div>
            <div class="etiqueta">Sin cubrir</div>
            <div class="numero" id="num-sin-cubrir">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-total">
            <i class="bi bi-calendar-x"></i>
          </div>
          <div>
            <div class="etiqueta">Total</div>
            <div class="numero" id="num-total">0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tarjeta con filtros + tabla -->
    <div class="tarjeta">

      <!-- Barra de filtros -->
      <div class="barra-acciones">
        <select class="select-filtro" id="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="PENDIENTE">Pendiente</option>
          <option value="CUBIERTA">Cubierta</option>
          <option value="SIN_CUBRIR">Sin cubrir</option>
        </select>
        <input type="date" class="input-busqueda" id="filtro-fecha-desde" title="Desde">
        <input type="date" class="input-busqueda" id="filtro-fecha-hasta" title="Hasta">
      </div>

      <!-- Tabla -->
      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Profesor</th>
              <th>Fecha</th>
              <th>Tramo</th>
              <th>Espacio</th>
              <th>Tarea</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <!-- Contador de resultados -->
      <div class="contador-ausencias" id="contador-texto">
        Mostrando 0 ausencias
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("ausencias", "../../");
      actualizarResumen();
      cargarAusencias();

      document.getElementById("filtro-estado").addEventListener("change", cargarAusencias);
      document.getElementById("filtro-fecha-desde").addEventListener("change", cargarAusencias);
      document.getElementById("filtro-fecha-hasta").addEventListener("change", cargarAusencias);
    });

    function actualizarResumen() {
      apiFetch('/api/v1/ausencias?estado=PENDIENTE&limit=1').then(function (d) {
        document.getElementById("num-pendientes").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-pendientes").textContent = "0"; });

      apiFetch('/api/v1/ausencias?estado=CUBIERTA&limit=1').then(function (d) {
        document.getElementById("num-cubiertas").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-cubiertas").textContent = "0"; });

      apiFetch('/api/v1/ausencias?estado=SIN_CUBRIR&limit=1').then(function (d) {
        document.getElementById("num-sin-cubrir").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-sin-cubrir").textContent = "0"; });

      apiFetch('/api/v1/ausencias?limit=1').then(function (d) {
        document.getElementById("num-total").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-total").textContent = "0"; });
    }

    function cargarAusencias() {
      var estado = document.getElementById("filtro-estado").value;
      var fechaDesde = document.getElementById("filtro-fecha-desde").value;
      var fechaHasta = document.getElementById("filtro-fecha-hasta").value;

      var url = '/api/v1/ausencias?limit=20';
      if (estado) url += '&estado=' + encodeURIComponent(estado);
      if (fechaDesde) url += '&fecha_desde=' + encodeURIComponent(fechaDesde);
      if (fechaHasta) url += '&fecha_hasta=' + encodeURIComponent(fechaHasta);

      apiFetch(url).then(function (data) {
        var tbody = document.getElementById("tabla-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];
        var pag = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion : { total: 0 };

        document.getElementById("contador-texto").textContent =
          "Mostrando " + filas.length + " de " + pag.total + " ausencias";

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No se encontraron ausencias</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var a = filas[i];
          var fecha = formatearFecha(a.fecha);

          var nombreProf = (a.profesor_nombre || "") + " " + (a.profesor_apellidos || "");
          var depto = a.departamento || "—";

          var avatarSrc = a.avatar_url || "https://ui-avatars.com/api/?name=" + encodeURIComponent(nombreProf.trim()) + "&background=f1f5f9&color=475569&bold=true";

          var claseBadge, textoEstado;
          if (a.estado === "PENDIENTE") {
            claseBadge = "badge-pendiente"; textoEstado = "Pendiente";
          } else if (a.estado === "CUBIERTA") {
            claseBadge = "badge-cubierta"; textoEstado = "Cubierta";
          } else {
            claseBadge = "badge-en-proceso"; textoEstado = "Sin cubrir";
          }

          var hayTareaCelda;
          if (a.hay_tarea) {
            hayTareaCelda = '<span class="tarea-si"><i class="bi bi-check-circle-fill me-1"></i>Sí</span>';
          } else {
            hayTareaCelda = '<span class="tarea-no"><i class="bi bi-dash-circle me-1"></i>No</span>';
          }

          var estados = ["PENDIENTE", "CUBIERTA", "SIN_CUBRIR"];
          var textos = ["Pendiente", "Cubierta", "Sin cubrir"];
          var opcionesEstado = "";
          for (var j = 0; j < estados.length; j++) {
            opcionesEstado += '<option value="' + estados[j] + '"' + (a.estado === estados[j] ? " selected" : "") + '>' + textos[j] + '</option>';
          }

          html += '<tr>' +
                    '<td><div class="celda-profesor">' +
                      '<img src="' + avatarSrc + '" class="avatar-profesor" alt="">' +
                      '<div><div class="profesor-nombre">' + nombreProf.trim() + '</div><div class="profesor-departamento">' + depto + '</div></div>' +
                    '</div></td>' +
                    '<td class="celda-sm">' + fecha + '</td>' +
                    '<td class="celda-sm">' + (a.tramo_horario || "—") + '</td>' +
                    '<td class="celda-sm">' + (a.espacios_texto || "—") + '</td>' +
                    '<td>' + hayTareaCelda + '</td>' +
                    '<td><select class="select-filtro select-estado-inline" onchange="cambiarEstado(' + a.id_ausencia + ', this.value)">' + opcionesEstado + '</select></td>' +
                    '<td><div class="d-flex gap-1">' +
                      '<button class="btn-accion peligro" title="Eliminar" onclick="eliminarAusencia(' + a.id_ausencia + ')"><i class="bi bi-trash"></i></button>' +
                    '</div></td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-body").innerHTML =
          '<tr><td colspan="7" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No se encontraron ausencias</td></tr>';
        document.getElementById("contador-texto").textContent = "Mostrando 0 ausencias";
      });
    }

    function cambiarEstado(id, nuevoEstado) {
      apiFetch('/api/v1/ausencias/' + id + '/estado', {
        method: 'PATCH',
        body: JSON.stringify({ estado: nuevoEstado })
      }).then(function () {
        actualizarResumen();
        cargarAusencias();
      });
    }

    function eliminarAusencia(id) {
      if (!confirm("¿Eliminar esta ausencia definitivamente?")) return;
      apiFetch('/api/v1/ausencias/' + id, { method: 'DELETE' }).then(function () {
        actualizarResumen();
        cargarAusencias();
      });
    }
  </script>

</body>
</html>
