<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Incidencias — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/incidencias.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Gestión de Incidencias</h1>
        <p>Administra y actualiza el estado de todas las incidencias del centro.</p>
      </div>
      <a href="../../pages/compartido/nueva-incidencia.html" class="btn-primario">
        <i class="bi bi-plus-lg"></i>
        Nueva Incidencia
      </a>
    </div>

    <!-- Tarjetas de resumen -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-pendientes-inc">
            <i class="bi bi-exclamation-circle"></i>
          </div>
          <div>
            <div class="etiqueta">Pendientes</div>
            <div class="numero" id="num-abiertas">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-proceso-inc">
            <i class="bi bi-arrow-repeat"></i>
          </div>
          <div>
            <div class="etiqueta">En proceso</div>
            <div class="numero" id="num-proceso">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-resueltas-inc">
            <i class="bi bi-check-circle"></i>
          </div>
          <div>
            <div class="etiqueta">Resueltas</div>
            <div class="numero" id="num-resueltas">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-total-inc">
            <i class="bi bi-archive"></i>
          </div>
          <div>
            <div class="etiqueta">Total</div>
            <div class="numero" id="num-total">0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabla con filtros -->
    <div class="tarjeta">

      <!-- Barra de búsqueda y filtros -->
      <div class="barra-acciones">
        <input
          type="text"
          class="input-busqueda"
          id="input-busqueda"
          placeholder="Buscar por título, espacio o creador..."
        >
        <select class="select-filtro" id="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="ABIERTA">Pendiente</option>
          <option value="EN_PROCESO">En proceso</option>
          <option value="RESUELTA">Resuelta</option>
          <option value="CERRADA">Cerrada</option>
        </select>
        <select class="select-filtro" id="filtro-tipo">
          <option value="">Todos los tipos</option>
          <option value="EQUIPAMIENTO">Equipamiento</option>
          <option value="INFRAESTRUCTURA">Infraestructura</option>
          <option value="SOFTWARE">Software</option>
        </select>
      </div>

      <!-- Tabla -->
      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Incidencia</th>
              <th>Creador</th>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <!-- Contador -->
      <div class="contador-incidencias" id="contador-texto">
        Mostrando 0 incidencias
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    var _paginaActual = 1;

    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("incidencias", "../../");
      actualizarResumen();
      cargarIncidencias();

      document.getElementById("filtro-estado").addEventListener("change", function () { _paginaActual = 1; cargarIncidencias(); });
      document.getElementById("filtro-tipo").addEventListener("change", function () { _paginaActual = 1; cargarIncidencias(); });

      var timerBusqueda;
      document.getElementById("input-busqueda").addEventListener("input", function () {
        clearTimeout(timerBusqueda);
        timerBusqueda = setTimeout(function () { _paginaActual = 1; cargarIncidencias(); }, 300);
      });
    });

    function actualizarResumen() {
      apiFetch('/api/v1/incidencias?estado=ABIERTA&limit=1').then(function (d) {
        document.getElementById("num-abiertas").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-abiertas").textContent = "0"; });

      apiFetch('/api/v1/incidencias?estado=EN_PROCESO&limit=1').then(function (d) {
        document.getElementById("num-proceso").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-proceso").textContent = "0"; });

      apiFetch('/api/v1/incidencias?estado=RESUELTA&limit=1').then(function (d) {
        document.getElementById("num-resueltas").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-resueltas").textContent = "0"; });

      apiFetch('/api/v1/incidencias?limit=1').then(function (d) {
        document.getElementById("num-total").textContent = (d && d.datos && d.datos.paginacion) ? d.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-total").textContent = "0"; });
    }

    function cargarIncidencias() {
      var estado = document.getElementById("filtro-estado").value;
      var tipo = document.getElementById("filtro-tipo").value;
      var busqueda = document.getElementById("input-busqueda").value.trim();

      var url = '/api/v1/incidencias?limit=20&page=' + _paginaActual;
      if (estado) url += '&estado=' + encodeURIComponent(estado);
      if (tipo) url += '&tipo=' + encodeURIComponent(tipo);
      if (busqueda) url += '&busqueda=' + encodeURIComponent(busqueda);

      apiFetch(url).then(function (data) {
        var tbody = document.getElementById("tabla-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];
        var pag = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion : { total: 0 };

        document.getElementById("contador-texto").textContent =
          "Mostrando " + filas.length + " de " + pag.total + " incidencias";

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No se encontraron incidencias</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var inc = filas[i];
          var partes = inc.fecha.split("-");
          var fecha = partes[2] + "/" + partes[1] + "/" + partes[0];

          var claseBadge;
          if (inc.estado === "ABIERTA") claseBadge = "badge-pendiente";
          else if (inc.estado === "EN_PROCESO") claseBadge = "badge-en-proceso";
          else if (inc.estado === "RESUELTA") claseBadge = "badge-resuelta";
          else claseBadge = "badge-cerrada";

          var textoTipo;
          if (inc.tipo === "EQUIPAMIENTO") textoTipo = "Equipamiento";
          else if (inc.tipo === "INFRAESTRUCTURA") textoTipo = "Infraestructura";
          else if (inc.tipo === "SOFTWARE") textoTipo = "Software";
          else textoTipo = inc.tipo;

          var estados = ["ABIERTA", "EN_PROCESO", "RESUELTA", "CERRADA"];
          var textos = ["Pendiente", "En proceso", "Resuelta", "Cerrada"];
          var opcionesEstado = "";
          for (var j = 0; j < estados.length; j++) {
            opcionesEstado += '<option value="' + estados[j] + '"' + (inc.estado === estados[j] ? " selected" : "") + '>' + textos[j] + '</option>';
          }

          var espacio = inc.espacio_nombre || "—";
          var creador = inc.creador_nombre || "—";

          html += '<tr>' +
                    '<td><div class="inc-titulo-tabla">' + inc.titulo + '</div><div class="texto-secundario-celda">' + espacio + '</div></td>' +
                    '<td class="celda-sm">' + creador + '</td>' +
                    '<td class="celda-fecha-gris">' + fecha + '</td>' +
                    '<td><span class="badge-tipo">' + textoTipo + '</span></td>' +
                    '<td><select class="select-filtro select-estado-inline" onchange="cambiarEstado(' + inc.id_incidencia + ', this.value)">' + opcionesEstado + '</select></td>' +
                    '<td><div class="d-flex gap-1">' +
                      '<a href="../../pages/compartido/detalle-incidencia.html?id=' + inc.id_incidencia + '" class="btn-accion" title="Ver detalle"><i class="bi bi-eye"></i></a>' +
                      '<button class="btn-accion peligro" title="Eliminar" onclick="eliminarIncidencia(' + inc.id_incidencia + ')"><i class="bi bi-trash"></i></button>' +
                    '</div></td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-body").innerHTML =
          '<tr><td colspan="6" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No se encontraron incidencias</td></tr>';
        document.getElementById("contador-texto").textContent = "Mostrando 0 incidencias";
      });
    }

    function cambiarEstado(id, nuevoEstado) {
      apiFetch('/api/v1/incidencias/' + id + '/estado', {
        method: 'PATCH',
        body: JSON.stringify({ estado: nuevoEstado })
      }).then(function () {
        actualizarResumen();
        cargarIncidencias();
      });
    }

    function eliminarIncidencia(id) {
      if (!confirm("¿Eliminar esta incidencia definitivamente?")) return;
      apiFetch('/api/v1/incidencias/' + id, { method: 'DELETE' }).then(function () {
        actualizarResumen();
        cargarIncidencias();
      });
    }
  </script>

</body>
</html>
