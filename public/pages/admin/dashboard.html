<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="pagina-header">
      <h1 id="saludo">Panel de Administración</h1>
      <p>Resumen general del centro educativo.</p>
    </div>

    <!-- 4 tarjetas de resumen -->
    <div class="row g-3 mb-4">

      <!-- Incidencias activas -->
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-incidencias">
            <i class="bi bi-exclamation-triangle"></i>
          </div>
          <div>
            <div class="etiqueta">Incidencias Activas</div>
            <div class="numero" id="num-incidencias">0</div>
          </div>
        </div>
      </div>

      <!-- Ausencias hoy -->
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-ausencias">
            <i class="bi bi-calendar-x"></i>
          </div>
          <div>
            <div class="etiqueta">Ausencias Hoy</div>
            <div class="numero" id="num-ausencias">0</div>
          </div>
        </div>
      </div>

      <!-- Aulas reservadas -->
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-reservas">
            <i class="bi bi-calendar-check"></i>
          </div>
          <div>
            <div class="etiqueta">Aulas Reservadas</div>
            <div class="numero" id="num-reservas">0</div>
          </div>
        </div>
      </div>

      <!-- Profesores activos -->
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-profesores">
            <i class="bi bi-people"></i>
          </div>
          <div>
            <div class="etiqueta">Profesores Activos</div>
            <div class="numero" id="num-profesores">0</div>
          </div>
        </div>
      </div>

    </div>

    <!-- Fila inferior: incidencias recientes + coberturas -->
    <div class="row g-3">

      <!-- Incidencias recientes -->
      <div class="col-12 col-md-7">
        <div class="tarjeta tarjeta-altura-completa">

          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="tarjeta-titulo mb-0">Incidencias Recientes</h2>
            <a href="incidencias.html" class="btn-secundario btn-ver-todo">
              Ver todas <i class="bi bi-arrow-right"></i>
            </a>
          </div>

          <div class="tabla-responsive">
            <table class="tabla-datos">
              <thead>
                <tr>
                  <th>Incidencia</th>
                  <th>Creador</th>
                  <th>Estado</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody id="tabla-incidencias-body"></tbody>
            </table>
          </div>

        </div>
      </div>

      <!-- Coberturas de hoy -->
      <div class="col-12 col-md-5">
        <div class="tarjeta tarjeta-altura-completa">

          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="tarjeta-titulo mb-0">Coberturas de Hoy</h2>
            <a href="guardias.html" class="btn-secundario btn-ver-todo">
              Ver todas <i class="bi bi-arrow-right"></i>
            </a>
          </div>

          <div id="lista-coberturas"></div>

        </div>
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("dashboard", "../../");
      document.getElementById("saludo").textContent =
        "Bienvenido/a, " + usuario.nombre + " — Panel de Administración";

      var esAdmin = usuario.roles.includes("ADMINISTRADOR");

      // Tarjeta incidencias activas (ABIERTA + EN_PROCESO)
      Promise.all([
        apiFetch('/api/v1/incidencias?estado=ABIERTA&limit=1'),
        apiFetch('/api/v1/incidencias?estado=EN_PROCESO&limit=1')
      ]).then(function (res) {
        var abiertas = (res[0] && res[0].datos && res[0].datos.paginacion) ? res[0].datos.paginacion.total : 0;
        var enProceso = (res[1] && res[1].datos && res[1].datos.paginacion) ? res[1].datos.paginacion.total : 0;
        document.getElementById("num-incidencias").textContent = abiertas + enProceso;
      }).catch(function () {
        document.getElementById("num-incidencias").textContent = "0";
      });

      // Tarjeta ausencias pendientes
      apiFetch('/api/v1/ausencias?estado=PENDIENTE&limit=1').then(function (data) {
        var total = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion.total : 0;
        document.getElementById("num-ausencias").textContent = total;
      }).catch(function () {
        document.getElementById("num-ausencias").textContent = "0";
      });

      // Tarjeta reservas
      apiFetch('/api/v1/reservas?limit=1').then(function (data) {
        var total = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion.total : 0;
        document.getElementById("num-reservas").textContent = total;
      }).catch(function () {
        document.getElementById("num-reservas").textContent = "0";
      });

      // Tarjeta profesores activos (solo admin)
      if (esAdmin) {
        apiFetch('/api/v1/usuarios?rol=PROFESOR&activo=true&limit=1').then(function (data) {
          var total = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion.total : 0;
          document.getElementById("num-profesores").textContent = total;
        }).catch(function () {
          document.getElementById("num-profesores").textContent = "0";
        });
      } else {
        document.getElementById("num-profesores").textContent = "—";
      }

      // Tabla incidencias recientes
      apiFetch('/api/v1/incidencias?limit=4').then(function (data) {
        var tbody = document.getElementById("tabla-incidencias-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="sin-incidencias">Sin datos</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var inc = filas[i];
          var partes = inc.fecha.split("-");
          var fechaMostrar = partes[2] + "/" + partes[1];

          var claseBadge, textoEstado;
          if (inc.estado === "ABIERTA") {
            claseBadge = "badge-pendiente"; textoEstado = "Pendiente";
          } else if (inc.estado === "EN_PROCESO") {
            claseBadge = "badge-en-proceso"; textoEstado = "En proceso";
          } else if (inc.estado === "RESUELTA") {
            claseBadge = "badge-resuelta"; textoEstado = "Resuelta";
          } else {
            claseBadge = "badge-cerrada"; textoEstado = "Cerrada";
          }

          var espacio = inc.espacio_nombre || "—";
          var creador = inc.creador_nombre || "—";

          html += '<tr>' +
                    '<td><div class="inc-titulo">' + inc.titulo + '</div><div class="texto-secundario-celda">' + espacio + '</div></td>' +
                    '<td class="celda-sm">' + creador + '</td>' +
                    '<td><span class="badge-estado ' + claseBadge + '">' + textoEstado + '</span></td>' +
                    '<td class="celda-fecha-gris">' + fechaMostrar + '</td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-incidencias-body").innerHTML =
          '<tr><td colspan="4" class="sin-incidencias">Sin datos</td></tr>';
      });

      // Coberturas de hoy
      var contenedorCoberturas = document.getElementById("lista-coberturas");
      apiFetch('/api/v1/guardias/hoy').then(function (data) {
        var info = (data && data.datos) ? data.datos : {};
        var asignadas = info.asignadas || [];

        if (asignadas.length === 0) {
          contenedorCoberturas.innerHTML =
            '<div class="coberturas-vacias">' +
              '<i class="bi bi-shield-check coberturas-vacias-icono"></i>' +
              'Sin coberturas pendientes hoy' +
            '</div>';
          return;
        }

        var htmlCob = "";
        for (var i = 0; i < asignadas.length; i++) {
          var g = asignadas[i];
          var claseIcono = "cobertura-icono-pendiente";
          var iconoClass = "bi-shield-check";

          if (g.estado === "REALIZADA") {
            claseIcono = "cobertura-icono-realizada";
            iconoClass = "bi-check-circle";
          }

          var clase = g.clase || g.curso || "—";
          var tramo = g.tramo_horario || g.tramo || "";
          var sustituto = g.profesor_sustituto || g.sustituto_nombre || "—";
          var ausente = g.profesor_ausente || g.ausente_nombre || "—";

          htmlCob += '<div class="tarjeta-cobertura">' +
                       '<div class="cobertura-icono ' + claseIcono + '"><i class="bi ' + iconoClass + '"></i></div>' +
                       '<div class="cobertura-info">' +
                         '<div><span class="cobertura-clase">' + clase + '</span><span class="cobertura-tramo">' + tramo + '</span></div>' +
                         '<div class="cobertura-sustituto"><i class="bi bi-person-check me-1"></i>' + sustituto + '</div>' +
                         '<div class="cobertura-ausente"><i class="bi bi-person-x me-1"></i>Ausente: ' + ausente + '</div>' +
                       '</div>' +
                     '</div>';
        }
        contenedorCoberturas.innerHTML = htmlCob;
      }).catch(function () {
        contenedorCoberturas.innerHTML =
          '<div class="coberturas-vacias">' +
            '<i class="bi bi-shield-check coberturas-vacias-icono"></i>' +
            'Sin coberturas pendientes hoy' +
          '</div>';
      });
    });
  </script>

</body>
</html>
