<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incidencias — Mantenimiento — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/prof-incidencias.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Incidencias</h1>
        <p>Gestiona el estado de las incidencias del centro.</p>
      </div>
    </div>

    <div class="tarjeta">

      <div class="barra-acciones">
        <select class="select-filtro" id="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="ABIERTA">Pendiente</option>
          <option value="EN_PROCESO">En proceso</option>
          <option value="RESUELTA">Resuelta</option>
          <option value="CERRADA">Cerrada</option>
        </select>
        <select class="select-filtro" id="filtro-tipo">
          <option value="">Todos los tipos</option>
          <option value="MATERIAL">Material</option>
          <option value="HARDWARE">Hardware</option>
          <option value="SOFTWARE">Software</option>
          <option value="OTROS">Otros</option>
        </select>
      </div>

      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Incidencia</th>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <div class="contador-inc" id="contador-texto">
        Mostrando 0 incidencias
      </div>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("incidencias", "../../");
      cargarIncidencias();

      document.getElementById("filtro-estado").addEventListener("change", cargarIncidencias);
      document.getElementById("filtro-tipo").addEventListener("change", cargarIncidencias);
    });

    function cargarIncidencias() {
      var estado = document.getElementById("filtro-estado").value;
      var tipo = document.getElementById("filtro-tipo").value;

      var url = '/api/v1/incidencias?limit=50';
      if (estado) url += '&estado=' + encodeURIComponent(estado);
      if (tipo) url += '&tipo=' + encodeURIComponent(tipo);

      apiFetch(url).then(function (data) {
        var tbody = document.getElementById("tabla-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];
        var pag = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion : { total: 0 };

        document.getElementById("contador-texto").textContent =
          "Mostrando " + filas.length + " de " + pag.total + " incidencias";

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No hay incidencias en esta categoría</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var inc = filas[i];

          var claseBadge, textoEstado;
          if (inc.estado === "ABIERTA") { claseBadge = "badge-pendiente"; textoEstado = "Pendiente"; }
          else if (inc.estado === "EN_PROCESO") { claseBadge = "badge-en-proceso"; textoEstado = "En proceso"; }
          else if (inc.estado === "RESUELTA") { claseBadge = "badge-resuelta"; textoEstado = "Resuelta"; }
          else { claseBadge = "badge-cerrada"; textoEstado = "Cerrada"; }

          var mapasTipo = { "MATERIAL": "Material", "HARDWARE": "Hardware", "SOFTWARE": "Software", "OTROS": "Otros", "ELECTRICIDAD": "Material", "FONTANERIA": "Material", "INFRAESTRUCTURA": "Material" };
          var textoTipo = mapasTipo[inc.tipo] || inc.tipo;

          var fecha = formatearFecha(inc.fecha);
          var espacio = inc.espacio_nombre || "—";

          var botonesAccion = '<a href="../../pages/compartido/detalle-incidencia.html?id=' + inc.id_incidencia + '" class="btn-accion" title="Ver detalle"><i class="bi bi-eye"></i></a>';

          if (inc.estado === "ABIERTA") {
            botonesAccion += ' <button class="btn btn-sm btn-warning" style="font-size:12px;padding:3px 8px;" ' +
              'onclick="cambiarEstado(' + inc.id_incidencia + ', \'EN_PROCESO\')" title="Iniciar">' +
              '<i class="bi bi-play-fill"></i></button>';
          } else if (inc.estado === "EN_PROCESO") {
            botonesAccion += ' <button class="btn btn-sm btn-success" style="font-size:12px;padding:3px 8px;" ' +
              'onclick="cambiarEstado(' + inc.id_incidencia + ', \'RESUELTA\')" title="Resolver">' +
              '<i class="bi bi-check-lg"></i></button>';
          }

          html += '<tr>' +
                    '<td><div class="inc-titulo">' + inc.titulo + '</div><div class="texto-secundario-celda">' + espacio + '</div></td>' +
                    '<td>' + fecha + '</td>' +
                    '<td><span class="badge-tipo">' + textoTipo + '</span></td>' +
                    '<td><span class="badge-estado ' + claseBadge + '">' + textoEstado + '</span></td>' +
                    '<td><div class="d-flex gap-1">' + botonesAccion + '</div></td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-body").innerHTML =
          '<tr><td colspan="5" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No hay incidencias</td></tr>';
        document.getElementById("contador-texto").textContent = "Mostrando 0 incidencias";
      });
    }

    function cambiarEstado(idIncidencia, nuevoEstado) {
      var textoAccion = nuevoEstado === "EN_PROCESO" ? "iniciar" : "marcar como resuelta";
      if (!confirm("¿Seguro que quieres " + textoAccion + " esta incidencia?")) return;

      apiFetch('/api/v1/incidencias/' + idIncidencia + '/estado', {
        method: 'PATCH',
        body: JSON.stringify({ estado: nuevoEstado })
      }).then(function (data) {
        if (data && data.ok) {
          cargarIncidencias();
        } else {
          alert((data && data.mensaje) || "Error al cambiar estado");
        }
      }).catch(function () { alert("Error de conexión"); });
    }
  </script>

</body>
</html>
