<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Reserva — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/nueva-reserva.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <div class="pagina-header">
      <h1>Nueva Reserva de Espacio</h1>
      <p>Reserva un aula o sala del centro para tu actividad.</p>
    </div>

    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">

        <!-- Alerta de error -->
        <div class="alerta-error" id="alerta-error">
          <i class="bi bi-exclamation-circle me-1"></i>
          <span id="texto-error"></span>
        </div>

        <form id="form-reserva" onsubmit="enviarFormulario(event)">

          <!-- Fecha y tramo -->
          <div class="tarjeta">
            <div class="paso-cabecera">
              <div class="paso-numero">1</div>
              <span class="paso-titulo">¿Cuándo necesitas el espacio?</span>
            </div>
            <div class="row g-3">
              <div class="col-12 col-sm-6">
                <div class="campo-grupo mb-0">
                  <label for="campo-fecha">
                    Fecha <span class="obligatorio">*</span>
                  </label>
                  <input type="date" id="campo-fecha" required>
                </div>
              </div>
              <div class="col-12 col-sm-6">
                <div class="campo-grupo mb-0">
                  <label for="campo-tramo">
                    Tramo horario <span class="obligatorio">*</span>
                  </label>
                  <select id="campo-tramo" required>
                    <option value="">Selecciona un tramo...</option>
                    <option value="08:25-09:20">08:25 - 09:20</option>
                    <option value="09:20-10:15">09:20 - 10:15</option>
                    <option value="10:15-11:10">10:15 - 11:10</option>
                    <option value="11:10-11:40">11:10 - 11:40 (Recreo)</option>
                    <option value="11:40-12:35">11:40 - 12:35</option>
                    <option value="12:35-13:30">12:35 - 13:30</option>
                    <option value="13:30-14:25">13:30 - 14:25</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- Espacio -->
          <div class="tarjeta">
            <div class="paso-cabecera">
              <div class="paso-numero">2</div>
              <span class="paso-titulo">¿Qué espacio necesitas?</span>
            </div>
            <div class="campo-grupo mb-0">
              <label for="campo-espacio">
                Espacio <span class="obligatorio">*</span>
              </label>
              <select id="campo-espacio" required>
                <option value="">Selecciona un espacio...</option>
              </select>
            </div>
          </div>

          <!-- Motivo -->
          <div class="tarjeta">
            <div class="paso-cabecera">
              <div class="paso-numero">3</div>
              <span class="paso-titulo">¿Para qué necesitas el espacio?</span>
            </div>
            <div class="campo-grupo mb-0">
              <label for="campo-motivo">
                Motivo de la reserva <span class="label-opcional">(opcional)</span>
              </label>
              <input
                type="text"
                id="campo-motivo"
                placeholder="Ej: Examen de recuperación, reunión con familias, charla..."
              >
            </div>
          </div>

          <!-- Botones -->
          <button type="submit" class="btn-enviar" id="btn-enviar">
            <i class="bi bi-calendar-check"></i>
            Confirmar Reserva
          </button>

          <div class="cancelar-contenedor">
            <button type="button" onclick="history.back()" class="btn-cancelar">
              Cancelar y volver
            </button>
          </div>

        </form>
      </div>
    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("reservas", "../../");

      var hoy = new Date();
      var fechaHoy = hoy.getFullYear() + "-" +
                     String(hoy.getMonth() + 1).padStart(2, "0") + "-" +
                     String(hoy.getDate()).padStart(2, "0");
      var campoFecha = document.getElementById("campo-fecha");
      campoFecha.value = fechaHoy;
      campoFecha.min = fechaHoy;

      cargarEspacios();
    });

    function cargarEspacios() {
      apiFetch('/api/v1/espacios?estado=DISPONIBLE&limit=100').then(function (data) {
        var espacios = [];
        if (data && data.datos) {
          espacios = Array.isArray(data.datos) ? data.datos : (data.datos.registros || []);
        }

        var select = document.getElementById("campo-espacio");

        var porEdificio = {};
        var sinEdificio = [];
        for (var i = 0; i < espacios.length; i++) {
          var e = espacios[i];
          var edificio = e.edificio_nombre || "";
          if (edificio) {
            if (!porEdificio[edificio]) porEdificio[edificio] = [];
            porEdificio[edificio].push(e);
          } else {
            sinEdificio.push(e);
          }
        }

        var edificios = Object.keys(porEdificio).sort();
        for (var i = 0; i < edificios.length; i++) {
          var grupo = document.createElement("optgroup");
          grupo.label = edificios[i];
          var lista = porEdificio[edificios[i]];
          for (var j = 0; j < lista.length; j++) {
            var opt = document.createElement("option");
            opt.value = lista[j].id_espacio;
            opt.textContent = lista[j].nombre;
            grupo.appendChild(opt);
          }
          select.appendChild(grupo);
        }

        for (var i = 0; i < sinEdificio.length; i++) {
          var opt = document.createElement("option");
          opt.value = sinEdificio[i].id_espacio;
          opt.textContent = sinEdificio[i].nombre;
          select.appendChild(opt);
        }
      }).catch(function () {});
    }

    function mostrarError(mensaje) {
      var alerta = document.getElementById("alerta-error");
      document.getElementById("texto-error").textContent = mensaje;
      alerta.style.display = "block";
      alerta.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function enviarFormulario(event) {
      event.preventDefault();
      document.getElementById("alerta-error").style.display = "none";

      var fecha = document.getElementById("campo-fecha").value;
      var tramo = document.getElementById("campo-tramo").value;
      var idEspacio = document.getElementById("campo-espacio").value;
      var motivo = document.getElementById("campo-motivo").value.trim();

      if (!fecha) { mostrarError("La fecha es obligatoria."); return; }
      if (!tramo) { mostrarError("Debes seleccionar un tramo horario."); return; }
      if (!idEspacio) { mostrarError("Debes seleccionar un espacio."); return; }

      var cuerpo = {
        fecha: fecha,
        tramo_horario: tramo,
        id_espacio: parseInt(idEspacio)
      };
      if (motivo) cuerpo.motivo = motivo;

      var btn = document.getElementById("btn-enviar");
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Enviando...';

      apiFetch('/api/v1/reservas', {
        method: 'POST',
        body: JSON.stringify(cuerpo)
      }).then(function (data) {
        if (data && data.ok) {
          window.location.href = "../../pages/profesor/reservas.html";
        } else {
          var msg = (data && data.mensaje) || "Error al crear la reserva.";
          mostrarError(msg);
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-calendar-check"></i> Confirmar Reserva';
        }
      }).catch(function (err) {
        mostrarError("Error de conexión. Inténtalo de nuevo.");
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-calendar-check"></i> Confirmar Reserva';
      });
    }
  </script>

</body>
</html>
