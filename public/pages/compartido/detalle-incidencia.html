<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Incidencia — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/detalle-incidencia.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Enlace de volver -->
    <div class="volver-contenedor">
      <a id="enlace-volver" href="#" class="enlace-volver">
        <i class="bi bi-arrow-left"></i>
        Volver a Incidencias
      </a>
    </div>

    <!-- Zona de error si la incidencia no existe -->
    <div id="zona-error" style="display:none;">
      <div class="tarjeta zona-error-tarjeta">
        <i class="bi bi-exclamation-triangle error-icono"></i>
        <h2 class="error-titulo">Incidencia no encontrada</h2>
        <p class="error-texto">El identificador de la URL no corresponde a ninguna incidencia.</p>
      </div>
    </div>

    <!-- Zona de contenido -->
    <div id="zona-contenido" style="display:none;">

      <div class="row g-4">

        <!-- Columna principal -->
        <div class="col-12 col-lg-8">
          <div class="tarjeta">

            <div class="cabecera-detalle">
              <div class="badges-cabecera">
                <span id="badge-tipo" class="badge-tipo"></span>
                <span id="badge-estado" class="badge-estado"></span>
              </div>
              <h1 id="inc-titulo" class="titulo-incidencia"></h1>
            </div>

            <hr class="separador-inc">

            <div class="row g-3 mb-4">
              <div class="col-6">
                <div class="metadato-label">Fecha de creación</div>
                <div id="inc-fecha" class="metadato-valor"></div>
              </div>
              <div class="col-6">
                <div class="metadato-label">Espacio afectado</div>
                <div id="inc-espacio" class="metadato-valor"></div>
              </div>
              <div class="col-6">
                <div class="metadato-label">Creada por</div>
                <div id="inc-creador" class="metadato-valor"></div>
              </div>
              <div class="col-6">
                <div class="metadato-label">Gestionada por</div>
                <div id="inc-directivo" class="metadato-valor"></div>
              </div>
            </div>

            <div>
              <div class="descripcion-label">Descripción</div>
              <p id="inc-descripcion" class="descripcion-caja"></p>
            </div>

          </div>
        </div>

        <!-- Columna lateral -->
        <div class="col-12 col-lg-4">

          <div class="tarjeta mb-3">
            <div class="panel-titulo">Estado actual</div>
            <div id="estado-actual-texto"></div>
          </div>

          <!-- Panel de cambio de estado (solo gestores) -->
          <div class="tarjeta mb-3" id="panel-cambiar-estado" style="display:none;">
            <div class="panel-titulo-sm">Actualizar estado</div>
            <p class="panel-ayuda">Avanza la incidencia al siguiente estado.</p>
            <div id="botones-estado"></div>
          </div>

          <div class="tarjeta tarjeta-referencia">
            <div class="referencia-label">Referencia</div>
            <div id="inc-referencia" class="referencia-codigo"></div>
          </div>

        </div>

      </div>
    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    var _incId = new URLSearchParams(window.location.search).get('id');
    var _usuario = null;

    function claseBadgePor(estado) {
      if (estado === "ABIERTA") return "badge-pendiente";
      if (estado === "EN_PROCESO") return "badge-en-proceso";
      if (estado === "RESUELTA") return "badge-resuelta";
      return "badge-cerrada";
    }

    function textoBadgePor(estado) {
      if (estado === "ABIERTA") return "Pendiente";
      if (estado === "EN_PROCESO") return "En proceso";
      if (estado === "RESUELTA") return "Resuelta";
      return "Cerrada";
    }

    verificarSesion().then(function (usuario) {
      if (!usuario) return;
      _usuario = usuario;

      crearSidebar("incidencias", "../../");

      var esAdmin = tieneRol("ADMINISTRADOR");
      var esDirectivo = tieneRol("EQUIPO_DIRECTIVO");

      document.getElementById("enlace-volver").href = (esAdmin || esDirectivo)
        ? "../admin/incidencias.html"
        : "../profesor/incidencias.html";

      if (!_incId) {
        document.getElementById("zona-error").style.display = "block";
        return;
      }

      cargarIncidencia();
    });

    function cargarIncidencia() {
      apiFetch('/api/v1/incidencias/' + _incId).then(function (data) {
        if (!data || !data.ok || !data.datos) {
          document.getElementById("zona-error").style.display = "block";
          return;
        }

        var inc = data.datos;
        document.getElementById("zona-contenido").style.display = "block";

        document.getElementById("inc-titulo").textContent = inc.titulo;
        document.getElementById("inc-referencia").textContent = "INC-" + String(inc.id_incidencia).padStart(4, "0");

        document.getElementById("inc-fecha").textContent = formatearFecha(inc.fecha);

        document.getElementById("inc-espacio").textContent = inc.espacio_nombre || "—";

        var creador = ((inc.creador_nombre || "") + " " + (inc.creador_apellidos || "")).trim();
        document.getElementById("inc-creador").textContent = creador || "—";

        var directivo = inc.directivo_nombre || "";
        document.getElementById("inc-directivo").textContent = directivo || "Sin asignar";

        document.getElementById("inc-descripcion").textContent = inc.descripcion || "Sin descripción.";

        var textosTipo = { "MATERIAL": "Material", "INFRAESTRUCTURA": "Infraestructura", "SOFTWARE": "Software" };
        document.getElementById("badge-tipo").textContent = textosTipo[inc.tipo] || inc.tipo;

        var badgeEstado = document.getElementById("badge-estado");
        badgeEstado.className = "badge-estado " + claseBadgePor(inc.estado);
        badgeEstado.textContent = textoBadgePor(inc.estado);

        document.getElementById("estado-actual-texto").innerHTML =
          '<span class="badge-estado badge-estado-grande ' + claseBadgePor(inc.estado) + '">' +
            textoBadgePor(inc.estado) +
          '</span>';

        var esGestor = tieneRol("ADMINISTRADOR") || tieneRol("EQUIPO_DIRECTIVO") || tieneRol("CONSERJE");
        if (esGestor) {
          renderizarBotonesEstado(inc.estado);
        }
      }).catch(function () {
        document.getElementById("zona-error").style.display = "block";
      });
    }

    function renderizarBotonesEstado(estadoActual) {
      var panel = document.getElementById("panel-cambiar-estado");
      var contenedor = document.getElementById("botones-estado");
      var html = "";

      if (estadoActual === "ABIERTA") {
        html = '<button class="btn-primario btn-guardar-estado" onclick="cambiarEstado(\'EN_PROCESO\')">' +
                 '<i class="bi bi-arrow-right-circle me-1"></i>Pasar a En proceso' +
               '</button>';
      } else if (estadoActual === "EN_PROCESO") {
        html = '<button class="btn-primario btn-guardar-estado" onclick="cambiarEstado(\'RESUELTA\')">' +
                 '<i class="bi bi-check-circle me-1"></i>Marcar como Resuelta' +
               '</button>';
      } else if (estadoActual === "RESUELTA") {
        html = '<button class="btn-primario btn-guardar-estado" onclick="cambiarEstado(\'CERRADA\')">' +
                 '<i class="bi bi-lock me-1"></i>Cerrar incidencia' +
               '</button>';
      }

      if (html) {
        panel.style.display = "block";
        contenedor.innerHTML = html;
      }
    }

    function cambiarEstado(nuevoEstado) {
      apiFetch('/api/v1/incidencias/' + _incId + '/estado', {
        method: 'PATCH',
        body: JSON.stringify({ estado: nuevoEstado })
      }).then(function (data) {
        if (data && data.ok) {
          cargarIncidencia();
        } else {
          alert((data && data.mensaje) || "Error al actualizar estado");
        }
      }).catch(function () {
        alert("Error de conexión");
      });
    }
  </script>

</body>
</html>
