<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Incidencia — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/nueva-incidencia.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="pagina-header">
      <h1>Nueva Incidencia</h1>
      <p>Rellena todos los campos para registrar el problema.</p>
    </div>

    <!-- Formulario centrado -->
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="tarjeta">

          <!-- Alerta de error -->
          <div class="alerta-error" id="alerta-error">
            <i class="bi bi-exclamation-circle me-1"></i>
            <span id="texto-error"></span>
          </div>

          <form id="form-incidencia" onsubmit="enviarFormulario(event)">

            <!-- Título -->
            <div class="campo-grupo">
              <label for="campo-titulo">
                Título / Asunto <span class="obligatorio">*</span>
              </label>
              <input
                type="text"
                id="campo-titulo"
                placeholder="Ej: Proyector no funciona en el Aula 1A"
                required
              >
            </div>

            <!-- Espacio y Categoría en fila -->
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <div class="campo-grupo mb-0">
                  <label for="campo-espacio">
                    Ubicación / Espacio <span class="obligatorio">*</span>
                  </label>
                  <select id="campo-espacio" required>
                    <option value="">Selecciona un espacio...</option>
                  </select>
                </div>
              </div>

              <div class="col-12 col-md-6">
                <div class="campo-grupo mb-0">
                  <label for="campo-tipo">
                    Tipo <span class="obligatorio">*</span>
                  </label>
                  <select id="campo-tipo" required>
                    <option value="">Selecciona un tipo...</option>
                    <option value="MATERIAL">Material</option>
                    <option value="HARDWARE">Hardware</option>
                    <option value="SOFTWARE">Software</option>
                    <option value="OTROS">Otros</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Fecha -->
            <div class="campo-grupo campo-grupo-mt">
              <label for="campo-fecha">
                Fecha
              </label>
              <input type="date" id="campo-fecha">
            </div>

            <!-- Descripción -->
            <div class="campo-grupo">
              <label for="campo-descripcion">
                Descripción <span class="label-opcional">(opcional)</span>
              </label>
              <textarea
                id="campo-descripcion"
                placeholder="Describe el problema detalladamente: cuándo ocurre, qué has probado, si afecta a otros..."
              ></textarea>
            </div>

            <!-- Botones -->
            <div class="d-flex gap-2 flex-wrap">
              <button type="submit" class="btn-enviar" id="btn-enviar">
                <i class="bi bi-send"></i>
                Crear Incidencia
              </button>
            </div>

            <div class="cancelar-contenedor">
              <button type="button" onclick="history.back()" class="btn-cancelar">
                Cancelar y volver
              </button>
            </div>

          </form>

        </div>
      </div>
    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    var _usuario = null;

    verificarSesion().then(function (usuario) {
      if (!usuario) return;
      _usuario = usuario;

      crearSidebar("incidencias", "../../");

      var hoy = new Date();
      document.getElementById("campo-fecha").value =
        hoy.getFullYear() + "-" +
        String(hoy.getMonth() + 1).padStart(2, "0") + "-" +
        String(hoy.getDate()).padStart(2, "0");

      cargarEspacios();
    });

    function cargarEspacios() {
      apiFetch('/api/v1/espacios?limit=100').then(function (data) {
        var espacios = [];
        if (data && data.datos) {
          espacios = Array.isArray(data.datos) ? data.datos : (data.datos.registros || []);
        }

        var select = document.getElementById("campo-espacio");

        var porEdificio = {};
        var sinEdificio = [];
        for (var i = 0; i < espacios.length; i++) {
          var e = espacios[i];
          var edificio = e.edificio_nombre || "";
          if (edificio) {
            if (!porEdificio[edificio]) porEdificio[edificio] = [];
            porEdificio[edificio].push(e);
          } else {
            sinEdificio.push(e);
          }
        }

        var edificios = Object.keys(porEdificio).sort();
        for (var i = 0; i < edificios.length; i++) {
          var grupo = document.createElement("optgroup");
          grupo.label = edificios[i];
          var lista = porEdificio[edificios[i]];
          for (var j = 0; j < lista.length; j++) {
            var opt = document.createElement("option");
            opt.value = lista[j].id_espacio;
            opt.textContent = lista[j].nombre;
            grupo.appendChild(opt);
          }
          select.appendChild(grupo);
        }

        for (var i = 0; i < sinEdificio.length; i++) {
          var opt = document.createElement("option");
          opt.value = sinEdificio[i].id_espacio;
          opt.textContent = sinEdificio[i].nombre;
          select.appendChild(opt);
        }
      }).catch(function () {});
    }

    function mostrarError(mensaje) {
      var alerta = document.getElementById("alerta-error");
      document.getElementById("texto-error").textContent = mensaje;
      alerta.style.display = "block";
      alerta.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function enviarFormulario(event) {
      event.preventDefault();
      document.getElementById("alerta-error").style.display = "none";

      var titulo = document.getElementById("campo-titulo").value.trim();
      var tipo = document.getElementById("campo-tipo").value;
      var idEspacio = document.getElementById("campo-espacio").value;
      var fecha = document.getElementById("campo-fecha").value;
      var descripcion = document.getElementById("campo-descripcion").value.trim();

      if (!titulo) { mostrarError("El título es obligatorio."); return; }
      if (!tipo) { mostrarError("Debes seleccionar un tipo."); return; }

      var cuerpo = { titulo: titulo, tipo: tipo };
      if (idEspacio) cuerpo.id_espacio = parseInt(idEspacio);
      if (fecha) cuerpo.fecha = fecha;
      if (descripcion) cuerpo.descripcion = descripcion;

      var btn = document.getElementById("btn-enviar");
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Enviando...';

      apiFetch('/api/v1/incidencias', {
        method: 'POST',
        body: JSON.stringify(cuerpo)
      }).then(function (data) {
        if (data && data.ok) {
          if (_usuario && tieneRol("ADMINISTRADOR")) {
            window.location.href = "../../pages/admin/incidencias.html";
          } else {
            window.location.href = "../../pages/profesor/incidencias.html";
          }
        } else {
          mostrarError((data && data.mensaje) || "Error al crear la incidencia.");
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-send"></i> Crear Incidencia';
        }
      }).catch(function () {
        mostrarError("Error de conexión. Inténtalo de nuevo.");
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-send"></i> Crear Incidencia';
      });
    }
  </script>

</body>
</html>
