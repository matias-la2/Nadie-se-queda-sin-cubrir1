<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Incidencia — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/nueva-incidencia.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="pagina-header">
      <h1>Nueva Incidencia</h1>
      <p>Rellena todos los campos para registrar el problema.</p>
    </div>

    <!-- Formulario centrado -->
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="tarjeta">

          <!-- Alerta de error -->
          <div class="alerta-error" id="alerta-error">
            <i class="bi bi-exclamation-circle me-1"></i>
            <span id="texto-error"></span>
          </div>

          <form id="form-incidencia" onsubmit="enviarFormulario(event)">

            <!-- Título -->
            <div class="campo-grupo">
              <label for="campo-titulo">
                Título / Asunto <span class="obligatorio">*</span>
              </label>
              <input
                type="text"
                id="campo-titulo"
                placeholder="Ej: Proyector no funciona en el Aula 1A"
                required
              >
            </div>

            <!-- Espacio y Categoría en fila -->
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <div class="campo-grupo mb-0">
                  <label for="campo-espacio">
                    Ubicación / Espacio <span class="obligatorio">*</span>
                  </label>
                  <select id="campo-espacio" required>
                    <option value="">Selecciona un espacio...</option>
                  </select>
                </div>
              </div>

              <div class="col-12 col-md-6">
                <div class="campo-grupo mb-0">
                  <label>
                    Categoría <span class="obligatorio">*</span>
                  </label>
                  <input type="hidden" id="campo-tipo" value="">
                  <div class="categoria-opciones">
                    <button type="button" class="categoria-btn" onclick="seleccionarCategoria(this, 'EQUIPAMIENTO')">Equipamiento</button>
                    <button type="button" class="categoria-btn" onclick="seleccionarCategoria(this, 'INFRAESTRUCTURA')">Infraestructura</button>
                    <button type="button" class="categoria-btn" onclick="seleccionarCategoria(this, 'SOFTWARE')">Software</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Descripción -->
            <div class="campo-grupo campo-grupo-mt">
              <label for="campo-descripcion">
                Descripción <span class="obligatorio">*</span>
              </label>
              <textarea
                id="campo-descripcion"
                placeholder="Describe el problema detalladamente: cuándo ocurre, qué has probado, si afecta a otros..."
                required
              ></textarea>
            </div>

            <!-- Campo de imágenes adjuntas -->
            <div class="campo-grupo">
              <label for="campo-imagenes">
                Adjuntar imágenes <span class="label-opcional">(opcional)</span>
              </label>
              <input
                type="file"
                id="campo-imagenes"
                class="campo-imagenes"
                accept=".jpg,.jpeg,.png"
                multiple
                onchange="agregarImagenes(this)"
              >
              <p class="imagenes-info">Formatos: JPG, PNG. Máximo 3 imágenes, 5 MB cada una.</p>
              <div class="preview-contenedor" id="preview-imagenes"></div>
            </div>

            <!-- Botones -->
            <div class="d-flex gap-2 flex-wrap">
              <button type="submit" class="btn-enviar">
                <i class="bi bi-send"></i>
                Crear Incidencia
              </button>
            </div>

            <div class="cancelar-contenedor">
              <button type="button" onclick="history.back()" class="btn-cancelar">
                Cancelar y volver
              </button>
            </div>

          </form>

        </div>
      </div>
    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/datos-prueba.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    // Inicialización
    verificarSesion();
    crearSidebar("incidencias", "../../");
    var usuario = obtenerUsuarioActual();
    var imagenesSeleccionadas = []; // Guarda los archivos de imagen seleccionados

    // Actualiza el preview de miniaturas
    function actualizarPreview() {
      var contenedor = document.getElementById("preview-imagenes");
      contenedor.innerHTML = "";
      for (var i = 0; i < imagenesSeleccionadas.length; i++) {
        var item = document.createElement("div");
        item.className = "preview-item";

        var img = document.createElement("img");
        img.alt = imagenesSeleccionadas[i].name;

        // Cierre para capturar i y img correctamente
        (function(imgEl, archivo) {
          var reader = new FileReader();
          reader.onload = function(e) { imgEl.src = e.target.result; };
          reader.readAsDataURL(archivo);
        })(img, imagenesSeleccionadas[i]);

        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn-quitar-imagen";
        btn.textContent = "x";
        btn.setAttribute("onclick", "quitarImagen(" + i + ")");

        item.appendChild(img);
        item.appendChild(btn);
        contenedor.appendChild(item);
      }
    }

    // Quita una imagen del array y actualiza el preview
    function quitarImagen(indice) {
      imagenesSeleccionadas.splice(indice, 1);
      actualizarPreview();
    }

    // Valida y añade imágenes al array al seleccionarlas
    function agregarImagenes(input) {
      if (!input.files) return;
      for (var i = 0; i < input.files.length; i++) {
        if (imagenesSeleccionadas.length >= 3) {
          mostrarError("Solo puedes adjuntar un máximo de 3 imágenes.");
          break;
        }
        if (input.files[i].size > 5 * 1024 * 1024) {
          mostrarError("La imagen \"" + input.files[i].name + "\" supera los 5 MB.");
          continue;
        }
        imagenesSeleccionadas.push(input.files[i]);
      }
      input.value = ""; // Permite volver a seleccionar la misma imagen si se quitó
      actualizarPreview();
    }

    // Rellena el select de espacios
    var selectEspacio = document.getElementById("campo-espacio");
    for (var i = 0; i < ESPACIOS.length; i++) {
      var espacio = ESPACIOS[i];
      var opcion = document.createElement("option");
      opcion.value = espacio.nombre;
      opcion.textContent = espacio.nombre + " (cap. " + espacio.capacidad + ")";
      if (espacio.estado !== "DISPONIBLE") {
        opcion.disabled = true;
        opcion.textContent += " — " + espacio.estado;
      }
      selectEspacio.appendChild(opcion);
    }

    // Marca el botón de categoría pulsado y guarda el valor
    function seleccionarCategoria(boton, valor) {
      var btns = document.querySelectorAll(".categoria-btn");
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove("seleccionado");
      boton.classList.add("seleccionado");
      document.getElementById("campo-tipo").value = valor;
    }

    // Muestra el error y hace scroll hasta él
    function mostrarError(mensaje) {
      var alerta = document.getElementById("alerta-error");
      document.getElementById("texto-error").textContent = mensaje;
      alerta.style.display = "block";
      alerta.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    // Valida el form, crea la incidencia y redirige
    function enviarFormulario(event) {
      event.preventDefault();
      document.getElementById("alerta-error").style.display = "none";

      var titulo      = document.getElementById("campo-titulo").value.trim();
      var espacio     = document.getElementById("campo-espacio").value;
      var tipo        = document.getElementById("campo-tipo").value;
      var descripcion = document.getElementById("campo-descripcion").value.trim();

      if (!titulo)      { mostrarError("El título es obligatorio."); return; }
      if (!espacio)     { mostrarError("Debes seleccionar un espacio."); return; }
      if (!tipo)        { mostrarError("Debes seleccionar una categoría (Equipamiento, Infraestructura o Software)."); return; }
      if (!descripcion) { mostrarError("La descripción es obligatoria."); return; }

      var nuevoId = 0;
      for (var i = 0; i < INCIDENCIAS.length; i++) {
        if (INCIDENCIAS[i].id > nuevoId) nuevoId = INCIDENCIAS[i].id;
      }
      nuevoId++;

      var hoy = new Date();
      var fechaHoy = hoy.getFullYear() + "-" +
                     String(hoy.getMonth() + 1).padStart(2, "0") + "-" +
                     String(hoy.getDate()).padStart(2, "0");

      // Guarda los nombres de las imágenes adjuntas
      var nombreImagenes = null;
      if (imagenesSeleccionadas.length > 0) {
        nombreImagenes = [];
        for (var i = 0; i < imagenesSeleccionadas.length; i++) {
          nombreImagenes.push(imagenesSeleccionadas[i].name);
        }
      }

      INCIDENCIAS.push({
        id: nuevoId, titulo: titulo, descripcion: descripcion, tipo: tipo,
        fecha: fechaHoy, estado: "ABIERTA", // Toda incidencia nueva empieza en ABIERTA
        espacio: espacio, creador: usuario.nombre + " " + usuario.apellidos,
        asignado_a: null, imagenes: nombreImagenes
      });

      alert("Incidencia creada correctamente.");

      if (tieneRol("ADMINISTRADOR")) {
        window.location.href = "../../pages/admin/incidencias.html";
      } else {
        window.location.href = "../../pages/profesor/incidencias.html";
      }
    }
  </script>

</body>
</html>
