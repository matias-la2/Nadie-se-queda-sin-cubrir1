<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Guardias — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/prof-guardias.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <div class="pagina-header">
      <h1>Mis Guardias</h1>
      <p>Consulta tus guardias planificadas y las que has cubierto como sustituto.</p>
    </div>

    <!-- Guardias planificadas -->
    <div class="tarjeta mb-4">
      <h2 class="tarjeta-titulo mb-3"><i class="bi bi-calendar-week me-2"></i>Mis guardias planificadas</h2>
      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Día</th>
              <th>Tramo horario</th>
              <th>Edificio</th>
              <th>Curso escolar</th>
            </tr>
          </thead>
          <tbody id="tabla-planificadas"></tbody>
        </table>
      </div>
    </div>

    <!-- Guardias pendientes de respuesta -->
    <div class="tarjeta mb-4" id="seccion-pendientes" style="display:none;">
      <h2 class="tarjeta-titulo mb-3" style="color:#92400e;"><i class="bi bi-bell-fill me-2"></i>Guardias pendientes de respuesta</h2>
      <div id="lista-pendientes-guardias"></div>
    </div>

    <!-- Guardias cubiertas -->
    <div class="tarjeta">
      <h2 class="tarjeta-titulo mb-3"><i class="bi bi-shield-check me-2"></i>Guardias asignadas</h2>
      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tramo horario</th>
              <th>Profesor ausente</th>
              <th>Aula</th>
              <th>Tipo</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="tabla-cubiertas"></tbody>
        </table>
      </div>
    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    var _usuario = null;

    verificarSesion().then(function (usuario) {
      if (!usuario) return;
      _usuario = usuario;

      crearSidebar("guardias", "../../");
      cargarPlanificadas(usuario);
      cargarCubiertas(usuario);
    });

    function cargarPlanificadas(usuario) {
      var diasSemana = ["", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];

      apiFetch('/api/v1/guardias/creadas?id_usuario=' + usuario.id).then(function (data) {
        var tbody = document.getElementById("tabla-planificadas");
        var filas = [];

        if (data && data.datos) {
          filas = Array.isArray(data.datos) ? data.datos : (data.datos.registros || []);
        }

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="sin-resultados"><i class="bi bi-calendar-x sin-resultados-icono"></i>No tienes guardias planificadas</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var g = filas[i];
          var dia = g.dia_semana ? diasSemana[g.dia_semana] : "—";

          html += '<tr>' +
                    '<td>' + dia + '</td>' +
                    '<td>' + (g.tramo_horario || "—") + '</td>' +
                    '<td>' + (g.edificio_nombre || "—") + '</td>' +
                    '<td>' + (g.curso_escolar || "—") + '</td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-planificadas").innerHTML =
          '<tr><td colspan="4" class="sin-resultados"><i class="bi bi-calendar-x sin-resultados-icono"></i>No tienes guardias planificadas</td></tr>';
      });
    }

    function cargarCubiertas(usuario) {
      apiFetch('/api/v1/guardias/asignadas?id_profesor_sustituto=' + usuario.id).then(function (data) {
        var tbody = document.getElementById("tabla-cubiertas");
        var filas = [];

        if (data && data.datos) {
          filas = Array.isArray(data.datos) ? data.datos : (data.datos.registros || []);
        }

        // Separar pendientes del resto
        var pendientes = [];
        var resto = [];
        for (var i = 0; i < filas.length; i++) {
          if (filas[i].estado === 'PENDIENTE') {
            pendientes.push(filas[i]);
          } else {
            resto.push(filas[i]);
          }
        }

        // Renderizar pendientes
        var seccionPend = document.getElementById("seccion-pendientes");
        if (pendientes.length > 0) {
          seccionPend.style.display = "block";
          var htmlPend = "";
          for (var i = 0; i < pendientes.length; i++) {
            var g = pendientes[i];
            var fecha = formatearFecha(g.fecha);
            var ausente = g.ausente_nombre || "—";
            if (g.ausente_apellidos) ausente += " " + g.ausente_apellidos;

            htmlPend += '<div class="tarjeta-guardia-pendiente" style="padding:14px;border:1px solid #fde68a;border-radius:10px;margin-bottom:10px;background:#fffbeb;">' +
              '<div class="d-flex justify-content-between align-items-start flex-wrap gap-2">' +
                '<div>' +
                  '<div style="font-weight:600;font-size:15px;color:#92400e;"><i class="bi bi-shield-exclamation me-1"></i>Guardia asignada</div>' +
                  '<div style="font-size:13px;color:#78350f;margin-top:4px;">' +
                    '<i class="bi bi-calendar3 me-1"></i>' + fecha +
                    ' <i class="bi bi-clock ms-2 me-1"></i>' + (g.tramo_horario || "—") +
                  '</div>' +
                  '<div style="font-size:13px;color:#78350f;margin-top:2px;">' +
                    '<i class="bi bi-person-x me-1"></i>Ausente: ' + ausente +
                  '</div>' +
                  (g.aula_nombre ? '<div style="font-size:13px;color:#78350f;margin-top:2px;"><i class="bi bi-geo-alt me-1"></i>Aula: ' + g.aula_nombre + ' (' + (g.aula_edificio || "") + ')</div>' : '') +
                '</div>' +
                '<div class="d-flex gap-2">' +
                  '<button class="btn btn-success btn-sm" onclick="responderGuardia(this, ' + g.id_guardia_asignada + ', \'ACEPTADA\')" style="font-size:13px;padding:6px 16px;">' +
                    '<i class="bi bi-check-lg me-1"></i>Aceptar</button>' +
                  '<button class="btn btn-danger btn-sm" onclick="responderGuardia(this, ' + g.id_guardia_asignada + ', \'RECHAZADA\')" style="font-size:13px;padding:6px 16px;">' +
                    '<i class="bi bi-x-lg me-1"></i>Rechazar</button>' +
                '</div>' +
              '</div>' +
            '</div>';
          }
          document.getElementById("lista-pendientes-guardias").innerHTML = htmlPend;
        } else {
          seccionPend.style.display = "none";
        }

        // Renderizar tabla de todas las guardias asignadas
        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="sin-resultados"><i class="bi bi-shield-x sin-resultados-icono"></i>No tienes guardias asignadas</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var g = filas[i];

          var fecha = formatearFecha(g.fecha);

          var tipoBadge;
          if (g.tipo_asignacion === "AUTOMATICA") {
            tipoBadge = '<span class="tipo-automatica">Automatica</span>';
          } else {
            tipoBadge = '<span class="tipo-manual">Manual</span>';
          }

          var estadoBadge;
          if (g.estado === "ACEPTADA") {
            estadoBadge = '<span class="badge-estado badge-cubierta">Aceptada</span>';
          } else if (g.estado === "RECHAZADA") {
            estadoBadge = '<span class="badge-estado badge-cerrada">Rechazada</span>';
          } else {
            estadoBadge = '<span class="badge-estado badge-pendiente">Pendiente</span>';
          }

          html += '<tr>' +
                    '<td class="fecha-peso">' + fecha + '</td>' +
                    '<td>' + (g.tramo_horario || "—") + '</td>' +
                    '<td>' + (g.ausente_nombre || g.profesor_ausente || "—") + '</td>' +
                    '<td>' + (g.aula_nombre ? g.aula_nombre + ' (' + (g.aula_edificio || "") + ')' : "—") + '</td>' +
                    '<td>' + tipoBadge + '</td>' +
                    '<td>' + estadoBadge + '</td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-cubiertas").innerHTML =
          '<tr><td colspan="6" class="sin-resultados"><i class="bi bi-shield-x sin-resultados-icono"></i>No tienes guardias asignadas</td></tr>';
      });
    }

    function responderGuardia(btn, idGuardia, accion) {
      var textoAccion = accion === 'ACEPTADA' ? 'aceptar' : 'rechazar';
      if (!confirm("¿Seguro que quieres " + textoAccion + " esta guardia?")) return;

      var tarjeta = btn.closest('.tarjeta-guardia-pendiente');
      var botones = tarjeta ? tarjeta.querySelectorAll('button') : [];
      for (var i = 0; i < botones.length; i++) botones[i].disabled = true;
      var textoOriginal = btn.innerHTML;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Procesando...';

      apiFetch('/api/v1/guardias/asignadas/' + idGuardia + '/responder', {
        method: 'PATCH',
        body: JSON.stringify({ accion: accion })
      }).then(function (data) {
        if (data && data.ok) {
          var resultado = data.datos || {};
          var msgHtml;

          if (accion === 'ACEPTADA') {
            var aulaTexto = '';
            if (resultado.aula) aulaTexto = ' Debes acudir al ' + resultado.aula.nombre + ' (edificio ' + resultado.aula.edificio + ').';
            var tareaTexto = resultado.hay_tarea ? ' Hay tarea para los alumnos.' : '';
            msgHtml = '<div style="padding:14px;border:1px solid #86efac;border-radius:10px;background:#f0fdf4;color:#166534;margin-bottom:10px;">' +
                        '<i class="bi bi-check-circle-fill me-2"></i>' +
                        '<strong>Guardia aceptada correctamente.</strong>' + aulaTexto + tareaTexto +
                      '</div>';
          } else {
            var info = '';
            if (resultado.reasignado) {
              info = ' Se notificará al siguiente profesor disponible.';
            } else if (resultado.sin_cubrir) {
              info = ' No quedan profesores disponibles. Se ha notificado al equipo directivo.';
            }
            msgHtml = '<div style="padding:14px;border:1px solid #93c5fd;border-radius:10px;background:#eff6ff;color:#1e40af;margin-bottom:10px;">' +
                        '<i class="bi bi-info-circle-fill me-2"></i>' +
                        '<strong>Guardia rechazada.</strong>' + info +
                      '</div>';
          }

          if (tarjeta) tarjeta.outerHTML = msgHtml;
          setTimeout(function () { if (_usuario) cargarCubiertas(_usuario); }, 2000);
        } else {
          btn.innerHTML = textoOriginal;
          for (var i = 0; i < botones.length; i++) botones[i].disabled = false;
          var errorDiv = '<div style="padding:8px 12px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;color:#991b1b;margin-bottom:8px;font-size:13px;">' +
            '<i class="bi bi-exclamation-triangle me-1"></i>' + ((data && data.mensaje) || "Error al responder") + '</div>';
          if (tarjeta) tarjeta.insertAdjacentHTML('afterbegin', errorDiv);
        }
      }).catch(function () {
        btn.innerHTML = textoOriginal;
        for (var i = 0; i < botones.length; i++) botones[i].disabled = false;
        if (tarjeta) tarjeta.insertAdjacentHTML('afterbegin',
          '<div style="padding:8px 12px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;color:#991b1b;margin-bottom:8px;font-size:13px;">' +
          '<i class="bi bi-exclamation-triangle me-1"></i>Error de conexión</div>');
      });
    }
  </script>

</body>
</html>
