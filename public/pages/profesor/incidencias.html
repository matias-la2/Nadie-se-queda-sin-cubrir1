<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incidencias — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/prof-incidencias.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Incidencias Registradas</h1>
        <p>Gestiona y visualiza el estado de tus reportes.</p>
      </div>
      <a href="../../pages/compartido/nueva-incidencia.html" class="btn-primario" id="btn-crear-incidencia">
        <i class="bi bi-plus-lg"></i>
        Crear Incidencia
      </a>
    </div>

    <!-- Tabla con filtros -->
    <div class="tarjeta">

      <div class="barra-acciones">
        <select class="select-filtro" id="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="ABIERTA">Pendiente</option>
          <option value="EN_PROCESO">En proceso</option>
          <option value="RESUELTA">Resuelta</option>
          <option value="CERRADA">Cerrada</option>
        </select>
        <select class="select-filtro" id="filtro-tipo">
          <option value="">Todos los tipos</option>
          <option value="EQUIPAMIENTO">Equipamiento</option>
          <option value="INFRAESTRUCTURA">Infraestructura</option>
          <option value="SOFTWARE">Software</option>
        </select>
      </div>

      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Incidencia</th>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <div class="contador-inc" id="contador-texto">
        Mostrando 0 incidencias
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("incidencias", "../../");

      var esConserje = usuario.roles.includes("CONSERJE") &&
                       !usuario.roles.includes("ADMINISTRADOR") &&
                       !usuario.roles.includes("EQUIPO_DIRECTIVO") &&
                       !usuario.roles.includes("PROFESOR");
      if (esConserje) {
        document.getElementById("btn-crear-incidencia").style.display = "none";
      }

      cargarMisIncidencias();

      document.getElementById("filtro-estado").addEventListener("change", cargarMisIncidencias);
      document.getElementById("filtro-tipo").addEventListener("change", cargarMisIncidencias);
    });

    function cargarMisIncidencias() {
      var estado = document.getElementById("filtro-estado").value;
      var tipo = document.getElementById("filtro-tipo").value;

      var url = '/api/v1/incidencias?limit=20';
      if (estado) url += '&estado=' + encodeURIComponent(estado);
      if (tipo) url += '&tipo=' + encodeURIComponent(tipo);

      apiFetch(url).then(function (data) {
        var tbody = document.getElementById("tabla-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];
        var pag = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion : { total: 0 };

        document.getElementById("contador-texto").textContent =
          "Mostrando " + filas.length + " de " + pag.total + " incidencias";

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No hay incidencias en esta categoría</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var inc = filas[i];

          var claseBadge, textoEstado;
          if (inc.estado === "ABIERTA") { claseBadge = "badge-pendiente"; textoEstado = "Pendiente"; }
          else if (inc.estado === "EN_PROCESO") { claseBadge = "badge-en-proceso"; textoEstado = "En proceso"; }
          else if (inc.estado === "RESUELTA") { claseBadge = "badge-resuelta"; textoEstado = "Resuelta"; }
          else { claseBadge = "badge-cerrada"; textoEstado = "Cerrada"; }

          var textoTipo;
          if (inc.tipo === "EQUIPAMIENTO") textoTipo = "Equipamiento";
          else if (inc.tipo === "INFRAESTRUCTURA") textoTipo = "Infraestructura";
          else if (inc.tipo === "SOFTWARE") textoTipo = "Software";
          else textoTipo = inc.tipo;

          var partes = inc.fecha.split("-");
          var fecha = partes[2] + "/" + partes[1] + "/" + partes[0];
          var espacio = inc.espacio_nombre || "—";

          html += '<tr>' +
                    '<td><div class="inc-titulo">' + inc.titulo + '</div><div class="texto-secundario-celda">' + espacio + '</div></td>' +
                    '<td>' + fecha + '</td>' +
                    '<td><span class="badge-tipo">' + textoTipo + '</span></td>' +
                    '<td><span class="badge-estado ' + claseBadge + '">' + textoEstado + '</span></td>' +
                    '<td><a href="../../pages/compartido/detalle-incidencia.html?id=' + inc.id_incidencia + '" class="btn-accion" title="Ver detalle"><i class="bi bi-eye"></i></a></td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-body").innerHTML =
          '<tr><td colspan="5" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No hay incidencias</td></tr>';
        document.getElementById("contador-texto").textContent = "Mostrando 0 incidencias";
      });
    }
  </script>

</body>
</html>
