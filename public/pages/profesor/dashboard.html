<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/prof-dashboard.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="pagina-header">
      <h1 id="saludo">¡Hola!</h1>
      <p>Bienvenido/a a tu panel de control para hoy.</p>
    </div>

    <!-- Tarjetas de resumen -->
    <div class="row g-3 mb-4">

      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-sig-guardia">
            <i class="bi bi-shield-check"></i>
          </div>
          <div>
            <div class="etiqueta">Guardias hoy</div>
            <div class="numero" id="num-guardias-hoy">0</div>
          </div>
        </div>
      </div>

      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-inc-activas">
            <i class="bi bi-exclamation-triangle"></i>
          </div>
          <div>
            <div class="etiqueta">Mis incidencias</div>
            <div class="numero" id="num-incidencias">0</div>
          </div>
        </div>
      </div>

      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-guard-pend">
            <i class="bi bi-calendar-check"></i>
          </div>
          <div>
            <div class="etiqueta">Mis reservas</div>
            <div class="numero" id="num-reservas">0</div>
          </div>
        </div>
      </div>

      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-guard-pend">
            <i class="bi bi-calendar-x"></i>
          </div>
          <div>
            <div class="etiqueta">Mis ausencias</div>
            <div class="numero" id="num-ausencias">0</div>
          </div>
        </div>
      </div>

    </div>

    <!-- Fila inferior -->
    <div class="row g-3">

      <!-- Mis guardias de hoy -->
      <div class="col-12 col-md-5">
        <div class="tarjeta tarjeta-altura-completa">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="tarjeta-titulo mb-0">Mis guardias de hoy</h2>
            <a href="guardias.html" class="btn-secundario btn-ver-todo">
              Ver todo <i class="bi bi-arrow-right"></i>
            </a>
          </div>
          <div id="lista-guardias-hoy"></div>
        </div>
      </div>

      <!-- Incidencias recientes -->
      <div class="col-12 col-md-7">
        <div class="tarjeta tarjeta-altura-completa">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="tarjeta-titulo mb-0">Incidencias recientes</h2>
            <a href="incidencias.html" class="btn-secundario btn-ver-todo">
              Ver todas <i class="bi bi-arrow-right"></i>
            </a>
          </div>
          <div class="tabla-responsive">
            <table class="tabla-datos">
              <thead>
                <tr>
                  <th>Incidencia</th>
                  <th>Estado</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody id="tabla-incidencias-body"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("dashboard", "../../");
      document.getElementById("saludo").textContent = "Bienvenido/a, " + usuario.nombre;

      // Tarjeta incidencias
      apiFetch('/api/v1/incidencias?limit=1').then(function (data) {
        document.getElementById("num-incidencias").textContent =
          (data && data.datos && data.datos.paginacion) ? data.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-incidencias").textContent = "0"; });

      // Tarjeta reservas
      apiFetch('/api/v1/reservas?limit=1').then(function (data) {
        document.getElementById("num-reservas").textContent =
          (data && data.datos && data.datos.paginacion) ? data.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-reservas").textContent = "0"; });

      // Tarjeta ausencias
      apiFetch('/api/v1/ausencias?limit=1').then(function (data) {
        document.getElementById("num-ausencias").textContent =
          (data && data.datos && data.datos.paginacion) ? data.datos.paginacion.total : 0;
      }).catch(function () { document.getElementById("num-ausencias").textContent = "0"; });

      // Guardias de hoy
      apiFetch('/api/v1/guardias/hoy').then(function (data) {
        var info = (data && data.datos) ? data.datos : {};
        var asignadas = info.asignadas || [];

        var misGuardias = [];
        var nombreUsuario = (usuario.nombre + " " + usuario.apellidos).toLowerCase();

        for (var i = 0; i < asignadas.length; i++) {
          var g = asignadas[i];
          var sustituto = (g.sustituto_nombre || g.profesor_sustituto || "").toLowerCase();
          var idSustituto = g.id_profesor_sustituto || null;

          if (idSustituto === usuario.id || sustituto.indexOf(usuario.nombre.toLowerCase()) !== -1) {
            misGuardias.push(g);
          }
        }

        document.getElementById("num-guardias-hoy").textContent = misGuardias.length;

        var contenedor = document.getElementById("lista-guardias-hoy");
        if (misGuardias.length === 0) {
          contenedor.innerHTML =
            '<div class="sin-resultados" style="text-align:center;padding:24px;color:#64748b;">' +
              '<i class="bi bi-shield-check" style="font-size:28px;display:block;margin-bottom:8px;"></i>' +
              'No tienes guardias hoy' +
            '</div>';
          return;
        }

        var html = "";
        for (var i = 0; i < misGuardias.length; i++) {
          var g = misGuardias[i];
          var clase = g.clase || g.curso || "—";
          var tramo = g.tramo_horario || g.tramo || "—";
          var ausente = g.ausente_nombre || g.profesor_ausente || "—";

          html += '<div style="padding:12px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:8px;">' +
                    '<div style="font-weight:600;font-size:14px;">' + clase + '</div>' +
                    '<div style="font-size:13px;color:#64748b;margin-top:2px;">' +
                      '<i class="bi bi-clock me-1"></i>' + tramo +
                    '</div>' +
                    '<div style="font-size:13px;color:#64748b;margin-top:2px;">' +
                      '<i class="bi bi-person-x me-1"></i>Ausente: ' + ausente +
                    '</div>' +
                  '</div>';
        }
        contenedor.innerHTML = html;
      }).catch(function () {
        document.getElementById("num-guardias-hoy").textContent = "0";
        document.getElementById("lista-guardias-hoy").innerHTML =
          '<div class="sin-resultados" style="text-align:center;padding:24px;color:#64748b;">No tienes guardias hoy</div>';
      });

      // Incidencias recientes
      apiFetch('/api/v1/incidencias?limit=3').then(function (data) {
        var tbody = document.getElementById("tabla-incidencias-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="sin-resultados" style="text-align:center;padding:24px;color:#64748b;">Sin incidencias</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var inc = filas[i];
          var partes = inc.fecha.split("-");
          var fecha = partes[2] + "/" + partes[1];

          var claseBadge, textoEstado;
          if (inc.estado === "ABIERTA") { claseBadge = "badge-pendiente"; textoEstado = "Pendiente"; }
          else if (inc.estado === "EN_PROCESO") { claseBadge = "badge-en-proceso"; textoEstado = "En proceso"; }
          else if (inc.estado === "RESUELTA") { claseBadge = "badge-resuelta"; textoEstado = "Resuelta"; }
          else { claseBadge = "badge-cerrada"; textoEstado = "Cerrada"; }

          html += '<tr>' +
                    '<td><div style="font-weight:500;font-size:13px;">' + inc.titulo + '</div></td>' +
                    '<td><span class="badge-estado ' + claseBadge + '">' + textoEstado + '</span></td>' +
                    '<td class="celda-fecha-gris">' + fecha + '</td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-incidencias-body").innerHTML =
          '<tr><td colspan="3" class="sin-resultados" style="text-align:center;padding:24px;color:#64748b;">Sin incidencias</td></tr>';
      });
    });
  </script>

</body>
</html>
