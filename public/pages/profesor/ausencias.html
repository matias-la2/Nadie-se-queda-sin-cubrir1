<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Ausencias — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/prof-ausencias.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Mis Ausencias</h1>
        <p>Consulta y gestiona tus ausencias registradas.</p>
      </div>
      <a href="../../pages/compartido/nueva-ausencia.html" class="btn-primario">
        <i class="bi bi-plus-lg"></i>
        Registrar Ausencia
      </a>
    </div>

    <!-- Filtros -->
    <div class="tarjeta">

      <div class="barra-acciones">
        <select class="select-filtro" id="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="PENDIENTE">Pendiente</option>
          <option value="CUBIERTA">Cubierta</option>
          <option value="SIN_CUBRIR">Sin cubrir</option>
        </select>
      </div>

      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tramo horario</th>
              <th>Espacio</th>
              <th>Estado</th>
              <th>Hay tarea</th>
              <th>Comentario</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <div class="contador-aus" id="contador-texto">
        Mostrando 0 ausencias
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("ausencias", "../../");
      cargarMisAusencias();

      document.getElementById("filtro-estado").addEventListener("change", cargarMisAusencias);
    });

    function cargarMisAusencias() {
      var estado = document.getElementById("filtro-estado").value;

      var url = '/api/v1/ausencias?limit=20';
      if (estado) url += '&estado=' + encodeURIComponent(estado);

      apiFetch(url).then(function (data) {
        var tbody = document.getElementById("tabla-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];
        var pag = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion : { total: 0 };

        document.getElementById("contador-texto").textContent =
          "Mostrando " + filas.length + " de " + pag.total + " ausencias";

        if (filas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="sin-resultados"><i class="bi bi-calendar-x sin-resultados-icono"></i>No hay ausencias en esta categoría</td></tr>';
          return;
        }

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var a = filas[i];

          var fecha = formatearFecha(a.fecha);

          var claseBadge, textoEstado;
          if (a.estado === "PENDIENTE") { claseBadge = "badge-pendiente"; textoEstado = "Pendiente"; }
          else if (a.estado === "CUBIERTA") { claseBadge = "badge-cubierta"; textoEstado = "Cubierta"; }
          else { claseBadge = "badge-en-proceso"; textoEstado = "Sin cubrir"; }

          var hayTareaCelda;
          if (a.hay_tarea) {
            hayTareaCelda = '<span class="tarea-si"><i class="bi bi-check-circle-fill me-1"></i>Sí</span>';
          } else {
            hayTareaCelda = '<span class="tarea-no"><i class="bi bi-dash-circle me-1"></i>No</span>';
          }

          var comentario = a.comentario || "";
          if (comentario.length > 60) comentario = comentario.substring(0, 60) + "...";
          if (!comentario) comentario = '<span class="comentario-vacio">—</span>';

          html += '<tr>' +
                    '<td class="fecha-peso">' + fecha + '</td>' +
                    '<td>' + (a.tramo_horario || "—") + '</td>' +
                    '<td class="celda-sm">' + (a.espacios_texto || "—") + '</td>' +
                    '<td><span class="badge-estado ' + claseBadge + '">' + textoEstado + '</span></td>' +
                    '<td>' + hayTareaCelda + '</td>' +
                    '<td class="celda-comentario">' + comentario + '</td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-body").innerHTML =
          '<tr><td colspan="6" class="sin-resultados"><i class="bi bi-calendar-x sin-resultados-icono"></i>No hay ausencias</td></tr>';
        document.getElementById("contador-texto").textContent = "Mostrando 0 ausencias";
      });
    }
  </script>

</body>
</html>
