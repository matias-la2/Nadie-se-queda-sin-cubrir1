<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Reservas — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/prof-reservas.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Mis Reservas de Espacios</h1>
        <p>Consulta y gestiona las reservas de aulas y espacios del centro.</p>
      </div>
      <a href="../../pages/compartido/nueva-reserva.html" class="btn-primario">
        <i class="bi bi-plus-lg"></i>
        Nueva Reserva
      </a>
    </div>

    <!-- Tabla de reservas -->
    <div class="tarjeta">

      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tramo</th>
              <th>Espacio</th>
              <th>Edificio</th>
              <th>Reservado por</th>
              <th>Motivo</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <div class="contador-res" id="contador-texto">
        Mostrando 0 reservas
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    verificarSesion().then(function (usuario) {
      if (!usuario) return;

      crearSidebar("reservas", "../../");
      cargarMisReservas();
    });

    function cargarMisReservas() {
      apiFetch('/api/v1/reservas?limit=20').then(function (data) {
        var tbody = document.getElementById("tabla-body");
        var filas = (data && data.datos && data.datos.registros) ? data.datos.registros : [];
        var pag = (data && data.datos && data.datos.paginacion) ? data.datos.paginacion : { total: 0 };

        document.getElementById("contador-texto").textContent =
          "Mostrando " + filas.length + " de " + pag.total + " reservas";

        if (filas.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="7" class="sin-resultados">' +
              '<i class="bi bi-calendar-x sin-resultados-icono"></i>' +
              'No tienes reservas. <a href="../../pages/compartido/nueva-reserva.html" class="enlace-nueva-reserva">Crea una nueva reserva</a>' +
            '</td></tr>';
          return;
        }

        var hoy = new Date();
        hoy.setHours(0, 0, 0, 0);

        var html = "";
        for (var i = 0; i < filas.length; i++) {
          var r = filas[i];

          var fecha = formatearFecha(r.fecha);
          var esFutura = r.fecha ? new Date(String(r.fecha).substring(0, 10)) >= hoy : false;

          var acciones = "";
          if (esFutura) {
            acciones = '<button class="btn-accion peligro" title="Cancelar reserva" onclick="cancelarReserva(' + r.id_reserva + ')">' +
                         '<i class="bi bi-trash"></i>' +
                       '</button>';
          }

          var reservadoPor = "";
          if (r.profesor_nombre) {
            reservadoPor = r.profesor_nombre + " " + (r.profesor_apellidos || "");
          }

          html += '<tr>' +
                    '<td class="fecha-peso">' + fecha + '</td>' +
                    '<td>' + (r.tramo_horario || "—") + '</td>' +
                    '<td>' + (r.espacio_nombre || "—") + '</td>' +
                    '<td>' + (r.edificio_nombre || "—") + '</td>' +
                    '<td>' + (reservadoPor || "—") + '</td>' +
                    '<td class="celda-motivo">' + (r.motivo || "—") + '</td>' +
                    '<td>' + acciones + '</td>' +
                  '</tr>';
        }
        tbody.innerHTML = html;
      }).catch(function () {
        document.getElementById("tabla-body").innerHTML =
          '<tr><td colspan="7" class="sin-resultados"><i class="bi bi-calendar-x sin-resultados-icono"></i>No tienes reservas</td></tr>';
        document.getElementById("contador-texto").textContent = "Mostrando 0 reservas";
      });
    }

    function cancelarReserva(id) {
      if (!confirm("¿Seguro que quieres cancelar esta reserva?")) return;

      apiFetch('/api/v1/reservas/' + id, { method: 'DELETE' }).then(function (data) {
        if (data && data.ok) {
          cargarMisReservas();
        } else {
          alert((data && data.mensaje) || "Error al cancelar la reserva");
        }
      }).catch(function () {
        alert("Error de conexión");
      });
    }
  </script>

</body>
</html>
