<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Reservas — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/prof-reservas.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Mis Reservas de Espacios</h1>
        <p>Consulta y gestiona las reservas de aulas y espacios del centro.</p>
      </div>
      <a href="../compartido/nueva-reserva.html" class="btn-primario">
        <i class="bi bi-plus-lg"></i>
        Nueva Reserva
      </a>
    </div>

    <!-- Tarjetas resumen -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-4">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-res-total">
            <i class="bi bi-calendar-check"></i>
          </div>
          <div>
            <div class="etiqueta">Total reservas</div>
            <div class="numero" id="total-reservas">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-res-proximas">
            <i class="bi bi-calendar-event"></i>
          </div>
          <div>
            <div class="etiqueta">Próximas</div>
            <div class="numero" id="total-proximas">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-4">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-res-espacios">
            <i class="bi bi-door-open"></i>
          </div>
          <div>
            <div class="etiqueta">Espacios distintos</div>
            <div class="numero" id="total-espacios">0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabla de reservas -->
    <div class="tarjeta">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="tarjeta-titulo mb-0">Mis Reservas</h2>
      </div>

      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tramo</th>
              <th>Espacio</th>
              <th>Motivo</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <!-- Contador -->
      <div class="contador-res" id="contador-texto">
        Mostrando 0 reservas
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/datos-prueba.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    // Inicialización
    verificarSesion();
    crearSidebar("reservas", "../../");
    var usuario = obtenerUsuarioActual();
    var nombreCompleto = usuario.nombre + " " + usuario.apellidos;

    // Reservas con fecha >= hoy
    function calcularProximas(reservas) {
      var hoy = new Date();
      hoy.setHours(0, 0, 0, 0);
      var n = 0;
      for (var i = 0; i < reservas.length; i++) {
        if (new Date(reservas[i].fecha) >= hoy) n++;
      }
      return n;
    }

    // Espacios únicos reservados
    function calcularEspaciosDistintos(reservas) {
      var vistos = {};
      for (var i = 0; i < reservas.length; i++) vistos[reservas[i].espacio] = true;
      return Object.keys(vistos).length;
    }

    // Filtra y dibuja la tabla de reservas del usuario
    function renderizarReservas() {
      var tbody = document.getElementById("tabla-body");

      var misReservas = [];
      for (var i = 0; i < RESERVAS.length; i++) {
        if (RESERVAS[i].profesor === nombreCompleto) misReservas.push(RESERVAS[i]);
      }

      document.getElementById("total-reservas").textContent = misReservas.length;
      document.getElementById("total-proximas").textContent = calcularProximas(misReservas);
      document.getElementById("total-espacios").textContent = calcularEspaciosDistintos(misReservas);
      document.getElementById("contador-texto").textContent =
        "Mostrando " + misReservas.length + " reserva" + (misReservas.length !== 1 ? "s" : "");

      if (misReservas.length === 0) {
        tbody.innerHTML = (
          '<tr><td colspan="5" class="sin-resultados">' +
            '<i class="bi bi-calendar-x sin-resultados-icono"></i>' +
            'No tienes reservas. <a href="../compartido/nueva-reserva.html" class="enlace-nueva-reserva">Crea una nueva reserva</a>' +
          '</td></tr>'
        );
        return;
      }

      var html = "";
      for (var i = 0; i < misReservas.length; i++) {
        var reserva = misReservas[i];
        var partes = reserva.fecha.split("-");
        var fechaMostrar = partes[2] + "/" + partes[1] + "/" + partes[0];

        var hoy = new Date(); hoy.setHours(0, 0, 0, 0);
        var esProxima = new Date(reserva.fecha) >= hoy;
        var badgeFecha = esProxima ? '<span class="badge-proxima">Próxima</span>' : '';

        html += '<tr>' +
                  '<td><span class="fecha-peso">' + fechaMostrar + '</span>' + badgeFecha + '</td>' +
                  '<td>' + reserva.tramo + '</td>' +
                  '<td><span class="badge-tipo"><i class="bi bi-door-open me-1"></i>' + reserva.espacio + '</span></td>' +
                  '<td class="celda-motivo">' + reserva.motivo + '</td>' +
                  '<td>' +
                    '<button class="btn-accion peligro" title="Cancelar reserva" onclick="cancelarReserva(' + reserva.id + ')">' +
                      'Cancelar' +
                    '</button>' +
                  '</td>' +
                '</tr>';
      }
      tbody.innerHTML = html;
    }

    // Elimina la reserva y re-renderiza
    function cancelarReserva(id) {
      var reserva = null;
      for (var i = 0; i < RESERVAS.length; i++) {
        if (RESERVAS[i].id === id) { reserva = RESERVAS[i]; break; }
      }
      if (!reserva) return;
      var confirmar = confirm(
        '¿Cancelar la reserva de "' + reserva.espacio + '" el ' +
        reserva.fecha.split("-").reverse().join("/") + ' a las ' + reserva.tramo + '?'
      );
      if (!confirmar) return;
      for (var i = 0; i < RESERVAS.length; i++) {
        if (RESERVAS[i].id === id) { RESERVAS.splice(i, 1); break; }
      }
      renderizarReservas();
    }

    renderizarReservas();
  </script>

</body>
</html>
