<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IES Río Arba — Acceso</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Estilos globales -->
  <link rel="stylesheet" href="css/estilos.css">
  <!-- Estilos login -->
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <!-- Página de login centrada -->
  <div class="pagina-login">
    <div class="tarjeta-login">

      <!-- Título -->
      <h1 class="titulo-login">IES Río Arba</h1>
      <p class="subtitulo-login">Accede con tu cuenta del centro</p>

      <!-- Mensaje de error -->
      <div class="mensaje-error" id="error-login">
        <i class="bi bi-exclamation-circle me-1"></i>
        <span></span>
      </div>

      <!-- Botón de login con Google -->
      <a href="/api/v1/auth/google" class="btn-entrar">
        <svg width="20" height="20" viewBox="0 0 48 48" style="margin-right: 10px; vertical-align: middle;">
          <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.08 24.08 0 0 0 0 21.56l7.98-6.19z"/>
          <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Iniciar sesión con Google
      </a>

      <p class="texto-info-login">Solo pueden acceder profesores autorizados del centro con su cuenta institucional.</p>

    </div>
  </div>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var error = params.get('error');
      if (error) {
        var errorDiv = document.getElementById('error-login');
        errorDiv.querySelector('span').textContent = error;
        errorDiv.style.display = 'block';
        history.replaceState(null, '', '/');
      }
    })();
  </script>

</body>
</html>
