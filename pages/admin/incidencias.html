<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Incidencias — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/incidencias.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Gestión de Incidencias</h1>
        <p>Administra y actualiza el estado de todas las incidencias del centro.</p>
      </div>
      <a href="../compartido/nueva-incidencia.html" class="btn-primario">
        <i class="bi bi-plus-lg"></i>
        Nueva Incidencia
      </a>
    </div>

    <!-- Tarjetas de resumen -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-pendientes-inc">
            <i class="bi bi-exclamation-circle"></i>
          </div>
          <div>
            <div class="etiqueta">Pendientes</div>
            <div class="numero" id="num-abiertas">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-proceso-inc">
            <i class="bi bi-arrow-repeat"></i>
          </div>
          <div>
            <div class="etiqueta">En proceso</div>
            <div class="numero" id="num-proceso">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-resueltas-inc">
            <i class="bi bi-check-circle"></i>
          </div>
          <div>
            <div class="etiqueta">Resueltas</div>
            <div class="numero" id="num-resueltas">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="tarjeta-resumen">
          <div class="icono-circulo icono-total-inc">
            <i class="bi bi-archive"></i>
          </div>
          <div>
            <div class="etiqueta">Total</div>
            <div class="numero" id="num-total">0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabla con filtros -->
    <div class="tarjeta">

      <!-- Barra de búsqueda y filtros -->
      <div class="barra-acciones">
        <input
          type="text"
          class="input-busqueda"
          id="input-busqueda"
          placeholder="Buscar por título, espacio o creador..."
          oninput="renderizarIncidencias()"
        >
        <select class="select-filtro" id="filtro-estado" onchange="renderizarIncidencias()">
          <option value="">Todos los estados</option>
          <option value="ABIERTA">Pendiente</option>
          <option value="EN_PROCESO">En proceso</option>
          <option value="RESUELTA">Resuelta</option>
          <option value="CERRADA">Cerrada</option>
        </select>
        <select class="select-filtro" id="filtro-tipo" onchange="renderizarIncidencias()">
          <option value="">Todos los tipos</option>
          <option value="EQUIPAMIENTO">Equipamiento</option>
          <option value="INFRAESTRUCTURA">Infraestructura</option>
          <option value="SOFTWARE">Software</option>
        </select>
      </div>

      <!-- Tabla -->
      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Incidencia</th>
              <th>Creador</th>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <!-- Contador -->
      <div class="contador-incidencias" id="contador-texto">
        Mostrando 0 incidencias
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/datos-prueba.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    // Inicialización
    verificarSesion();
    crearSidebar("incidencias", "../../");

    // Tarjetas de resumen
    function actualizarResumen() {
      var ab = 0, pr = 0, re = 0;
      for (var i = 0; i < INCIDENCIAS.length; i++) {
        if (INCIDENCIAS[i].estado === "ABIERTA")     ab++;
        else if (INCIDENCIAS[i].estado === "EN_PROCESO") pr++;
        else if (INCIDENCIAS[i].estado === "RESUELTA")   re++;
      }
      document.getElementById("num-abiertas").textContent  = ab;
      document.getElementById("num-proceso").textContent   = pr;
      document.getElementById("num-resueltas").textContent = re;
      document.getElementById("num-total").textContent     = INCIDENCIAS.length;
    }
    actualizarResumen();

    // Filtra y dibuja la tabla de incidencias
    function renderizarIncidencias() {
      var tbody    = document.getElementById("tabla-body");
      var busqueda = document.getElementById("input-busqueda").value.trim().toLowerCase();
      var estado   = document.getElementById("filtro-estado").value;
      var tipo     = document.getElementById("filtro-tipo").value;

      var resultado = [];
      for (var i = 0; i < INCIDENCIAS.length; i++) {
        var inc = INCIDENCIAS[i];
        var okTexto  = !busqueda || inc.titulo.toLowerCase().indexOf(busqueda) !== -1 || inc.espacio.toLowerCase().indexOf(busqueda) !== -1 || inc.creador.toLowerCase().indexOf(busqueda) !== -1;
        var okEstado = !estado || inc.estado === estado;
        var okTipo   = !tipo   || inc.tipo   === tipo;
        if (okTexto && okEstado && okTipo) resultado.push(inc);
      }

      document.getElementById("contador-texto").textContent =
        "Mostrando " + resultado.length + " de " + INCIDENCIAS.length + " incidencias";

      if (resultado.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No se encontraron incidencias con esos filtros</td></tr>';
        return;
      }

      var html = "";
      for (var i = 0; i < resultado.length; i++) {
        var inc = resultado[i];
        var partes = inc.fecha.split("-");
        var fecha  = partes[2] + "/" + partes[1] + "/" + partes[0];

        // Badge de estado
        var claseBadge;
        if (inc.estado === "ABIERTA")       claseBadge = "badge-pendiente";
        else if (inc.estado === "EN_PROCESO") claseBadge = "badge-en-proceso";
        else if (inc.estado === "RESUELTA")  claseBadge = "badge-resuelta";
        else                                  claseBadge = "badge-cerrada";

        // Texto del tipo
        var textoTipo;
        if (inc.tipo === "EQUIPAMIENTO")      textoTipo = "Equipamiento";
        else if (inc.tipo === "INFRAESTRUCTURA") textoTipo = "Infraestructura";
        else if (inc.tipo === "SOFTWARE")        textoTipo = "Software";
        else                                      textoTipo = inc.tipo;

        // Select inline de cambio de estado
        var estados = ["ABIERTA", "EN_PROCESO", "RESUELTA", "CERRADA"];
        var textos  = ["Pendiente", "En proceso", "Resuelta", "Cerrada"];
        var opcionesEstado = "";
        for (var j = 0; j < estados.length; j++) {
          opcionesEstado += '<option value="' + estados[j] + '"' + (inc.estado === estados[j] ? " selected" : "") + '>' + textos[j] + '</option>';
        }

        html += '<tr>' +
                  '<td><div class="inc-titulo-tabla">' + inc.titulo + '</div><div class="texto-secundario-celda">' + inc.espacio + '</div></td>' +
                  '<td class="celda-sm">' + inc.creador + '</td>' +
                  '<td class="celda-fecha-gris">' + fecha + '</td>' +
                  '<td><span class="badge-tipo">' + textoTipo + '</span></td>' +
                  '<td><select class="select-filtro select-estado-inline" onchange="cambiarEstado(' + inc.id + ', this.value)">' + opcionesEstado + '</select></td>' +
                  '<td><div class="d-flex gap-1">' +
                    '<a href="../compartido/detalle-incidencia.html?id=' + inc.id + '" class="btn-accion" title="Ver detalle"><i class="bi bi-eye"></i></a>' +
                    '<button class="btn-accion peligro" title="Eliminar" onclick="eliminarIncidencia(' + inc.id + ')"><i class="bi bi-trash"></i></button>' +
                  '</div></td>' +
                '</tr>';
      }
      tbody.innerHTML = html;
    }

    // Cambia el estado y refresca tarjetas
    function cambiarEstado(id, nuevoEstado) {
      for (var i = 0; i < INCIDENCIAS.length; i++) {
        if (INCIDENCIAS[i].id === id) {
          INCIDENCIAS[i].estado = nuevoEstado;
          break;
        }
      }
      actualizarResumen();
      renderizarIncidencias();
    }

    // Elimina la incidencia del array
    function eliminarIncidencia(id) {
      if (!confirm("¿Eliminar esta incidencia definitivamente?")) return;
      for (var i = 0; i < INCIDENCIAS.length; i++) {
        if (INCIDENCIAS[i].id === id) { INCIDENCIAS.splice(i, 1); break; }
      }
      actualizarResumen();
      renderizarIncidencias();
    }

    renderizarIncidencias();
  </script>

</body>
</html>
