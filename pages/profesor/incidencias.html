<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incidencias — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/prof-incidencias.css">
</head>

<body>

  <!-- Sidebar inyectado por sidebar.js -->
  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div class="pagina-header mb-0">
        <h1>Incidencias Registradas</h1>
        <p>Gestiona y visualiza el estado de tus reportes.</p>
      </div>
      <a href="../compartido/nueva-incidencia.html" class="btn-primario">
        <i class="bi bi-plus-lg"></i>
        Crear Incidencia
      </a>
    </div>

    <!-- Tabla con pestañas -->
    <div class="tarjeta">

      <!-- Pestañas de filtrado -->
      <div class="tabs-filtro">
        <button class="tab-btn activo" onclick="cambiarTab(this, 'todas')">Todas</button>
        <button class="tab-btn" onclick="cambiarTab(this, 'ABIERTA')">Pendientes</button>
        <button class="tab-btn" onclick="cambiarTab(this, 'EN_PROCESO')">En proceso</button>
        <button class="tab-btn" onclick="cambiarTab(this, 'RESUELTA')">Resueltas</button>
      </div>

      <!-- Tabla -->
      <div class="tabla-responsive">
        <table class="tabla-datos">
          <thead>
            <tr>
              <th>Incidencia</th>
              <th>Fecha</th>
              <th>Categoría</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

      <!-- Contador de resultados -->
      <div class="contador-inc" id="contador-texto">
        Mostrando 0 incidencias
      </div>

    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/datos-prueba.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    // Inicialización
    verificarSesion();
    crearSidebar("incidencias", "../../");
    var usuario = obtenerUsuarioActual();
    var nombreCompleto = usuario.nombre + " " + usuario.apellidos;
    var filtroActual = "todas";

    // Cambia la pestaña activa y re-renderiza
    function cambiarTab(boton, filtro) {
      var btns = document.querySelectorAll(".tab-btn");
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove("activo");
      boton.classList.add("activo");
      filtroActual = filtro;
      renderizarIncidencias(filtro);
    }

    // Filtra las incidencias del usuario y dibuja la tabla
    function renderizarIncidencias(filtro) {
      var tbody = document.getElementById("tabla-body");

      // Solo incidencias del profesor actual
      var misIncidencias = [];
      for (var i = 0; i < INCIDENCIAS.length; i++) {
        if (INCIDENCIAS[i].creador === nombreCompleto) misIncidencias.push(INCIDENCIAS[i]);
      }

      var filtradas = filtro === "todas" ? misIncidencias : [];
      if (filtro !== "todas") {
        for (var i = 0; i < misIncidencias.length; i++) {
          if (misIncidencias[i].estado === filtro) filtradas.push(misIncidencias[i]);
        }
      }

      document.getElementById("contador-texto").textContent =
        "Mostrando " + filtradas.length + " de " + misIncidencias.length + " incidencias";

      if (filtradas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="sin-resultados"><i class="bi bi-inbox sin-resultados-icono"></i>No hay incidencias en esta categoría</td></tr>';
        return;
      }

      var html = "";
      for (var i = 0; i < filtradas.length; i++) {
        var inc = filtradas[i];

        var claseBadge;
        if (inc.estado === "ABIERTA")         claseBadge = "badge-pendiente";
        else if (inc.estado === "EN_PROCESO") claseBadge = "badge-en-proceso";
        else if (inc.estado === "RESUELTA")   claseBadge = "badge-resuelta";
        else                                   claseBadge = "badge-cerrada";

        var textoEstado;
        if (inc.estado === "ABIERTA")         textoEstado = "Pendiente";
        else if (inc.estado === "EN_PROCESO") textoEstado = "En proceso";
        else if (inc.estado === "RESUELTA")   textoEstado = "Resuelta";
        else                                   textoEstado = "Cerrada";

        var textoTipo;
        if (inc.tipo === "EQUIPAMIENTO")         textoTipo = "Equipamiento";
        else if (inc.tipo === "INFRAESTRUCTURA") textoTipo = "Infraestructura";
        else if (inc.tipo === "SOFTWARE")        textoTipo = "Software";
        else                                      textoTipo = inc.tipo;

        var partes = inc.fecha.split("-");
        var fechaMostrar = partes[2] + "/" + partes[1] + "/" + partes[0];

        html += '<tr>' +
                  '<td><div class="inc-titulo">' + inc.titulo + '</div><div class="texto-secundario-celda">' + inc.espacio + '</div></td>' +
                  '<td>' + fechaMostrar + '</td>' +
                  '<td><span class="badge-tipo">' + textoTipo + '</span></td>' +
                  '<td><span class="badge-estado ' + claseBadge + '">' + textoEstado + '</span></td>' +
                  // El profesor solo puede ver el detalle, no eliminar
                  '<td><a href="../compartido/detalle-incidencia.html?id=' + inc.id + '" class="btn-accion" title="Ver detalle"><i class="bi bi-eye"></i></a></td>' +
                '</tr>';
      }
      tbody.innerHTML = html;
    }

    renderizarIncidencias("todas");
  </script>

</body>
</html>
