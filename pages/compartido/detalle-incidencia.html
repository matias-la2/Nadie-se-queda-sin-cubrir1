<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Incidencia — IES Río Arba</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/estilos.css">
  <link rel="stylesheet" href="../../css/detalle-incidencia.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="contenido-principal">

    <!-- Enlace de volver (la ruta se construye según el rol) -->
    <div class="volver-contenedor">
      <a id="enlace-volver" href="#" class="enlace-volver">
        <i class="bi bi-arrow-left"></i>
        Volver a Incidencias
      </a>
    </div>

    <!-- Zona de error si la incidencia no existe -->
    <div id="zona-error" style="display:none;">
      <div class="tarjeta zona-error-tarjeta">
        <i class="bi bi-exclamation-triangle error-icono"></i>
        <h2 class="error-titulo">Incidencia no encontrada</h2>
        <p class="error-texto">El identificador de la URL no corresponde a ninguna incidencia.</p>
      </div>
    </div>

    <!-- Zona de contenido, visible cuando la incidencia existe -->
    <div id="zona-contenido" style="display:none;">

      <div class="row g-4">

        <!-- Columna principal: detalle -->
        <div class="col-12 col-lg-8">
          <div class="tarjeta">

            <!-- Título con badges -->
            <div class="cabecera-detalle">
              <div class="badges-cabecera">
                <span id="badge-tipo" class="badge-tipo"></span>
                <span id="badge-estado" class="badge-estado"></span>
              </div>
              <h1 id="inc-titulo" class="titulo-incidencia"></h1>
            </div>

            <hr class="separador-inc">

            <!-- Metadatos en 2 columnas -->
            <div class="row g-3 mb-4">
              <div class="col-6">
                <div class="metadato-label">Fecha de creación</div>
                <div id="inc-fecha" class="metadato-valor"></div>
              </div>
              <div class="col-6">
                <div class="metadato-label">Espacio afectado</div>
                <div id="inc-espacio" class="metadato-valor"></div>
              </div>
              <div class="col-6">
                <div class="metadato-label">Creada por</div>
                <div id="inc-creador" class="metadato-valor"></div>
              </div>
              <div class="col-6">
                <div class="metadato-label">Asignada a</div>
                <div id="inc-asignado" class="metadato-valor"></div>
              </div>
            </div>

            <!-- Descripción -->
            <div>
              <div class="descripcion-label">Descripción</div>
              <p id="inc-descripcion" class="descripcion-caja"></p>
            </div>

          </div>
        </div>

        <!-- Columna lateral: gestión de estado -->
        <div class="col-12 col-lg-4">

          <!-- Estado actual -->
          <div class="tarjeta mb-3">
            <div class="panel-titulo">Estado actual</div>
            <div id="estado-actual-texto"></div>
          </div>

          <!-- Panel de cambio de estado (solo admin/directivo) -->
          <div class="tarjeta mb-3" id="panel-cambiar-estado" style="display:none;">
            <div class="panel-titulo-sm">Actualizar estado</div>
            <p class="panel-ayuda">Selecciona el nuevo estado y guarda el cambio.</p>
            <select class="select-filtro select-estado-panel" id="select-nuevo-estado">
              <option value="ABIERTA">Pendiente</option>
              <option value="EN_PROCESO">En proceso</option>
              <option value="RESUELTA">Resuelta</option>
              <option value="CERRADA">Cerrada</option>
            </select>
            <button class="btn-primario btn-guardar-estado" onclick="guardarEstado()">
              <i class="bi bi-check-lg"></i>
              Guardar cambio
            </button>
          </div>

          <!-- Referencia -->
          <div class="tarjeta tarjeta-referencia">
            <div class="referencia-label">Referencia</div>
            <div id="inc-referencia" class="referencia-codigo"></div>
          </div>

        </div>

      </div>
    </div>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/datos-prueba.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>

  <script>
    // Inicialización
    verificarSesion();
    crearSidebar("incidencias", "../../");

    // Leemos el id de la URL y buscamos la incidencia
    var params     = new URLSearchParams(window.location.search);
    var idTexto    = params.get("id");
    var id         = idTexto ? parseInt(idTexto) : null;
    var incidencia = null;
    for (var i = 0; i < INCIDENCIAS.length; i++) {
      if (INCIDENCIAS[i].id === id) { incidencia = INCIDENCIAS[i]; break; }
    }

    var esAdmin    = tieneRol("ADMINISTRADOR");
    var esDirectivo = tieneRol("EQUIPO_DIRECTIVO");

    // El enlace de volver va a la lista del rol correspondiente
    document.getElementById("enlace-volver").href = (esAdmin || esDirectivo)
      ? "../admin/incidencias.html"
      : "../profesor/incidencias.html";

    // Determina la clase del badge según el estado
    function claseBadgePor(estado) {
      if (estado === "ABIERTA")       return "badge-pendiente";
      if (estado === "EN_PROCESO")    return "badge-en-proceso";
      if (estado === "RESUELTA")      return "badge-resuelta";
      return "badge-cerrada";
    }

    // Determina el texto del badge según el estado
    function textoBadgePor(estado) {
      if (estado === "ABIERTA")       return "Pendiente";
      if (estado === "EN_PROCESO")    return "En proceso";
      if (estado === "RESUELTA")      return "Resuelta";
      return "Cerrada";
    }

    if (!incidencia) {
      document.getElementById("zona-error").style.display     = "block";
      document.getElementById("zona-contenido").style.display = "none";
    } else {
      document.getElementById("zona-error").style.display     = "none";
      document.getElementById("zona-contenido").style.display = "block";

      document.getElementById("inc-titulo").textContent     = incidencia.titulo;
      document.getElementById("inc-referencia").textContent = "INC-" + String(incidencia.id).padStart(4, "0");

      var partes = incidencia.fecha.split("-");
      document.getElementById("inc-fecha").textContent    = partes[2] + "/" + partes[1] + "/" + partes[0];
      document.getElementById("inc-espacio").textContent  = incidencia.espacio;
      document.getElementById("inc-creador").textContent  = incidencia.creador;
      document.getElementById("inc-asignado").textContent = incidencia.asignado_a || "Sin asignar";
      document.getElementById("inc-descripcion").textContent = incidencia.descripcion;

      // Badge de tipo
      var textosTipo = { "EQUIPAMIENTO":"Equipamiento", "INFRAESTRUCTURA":"Infraestructura", "SOFTWARE":"Software" };
      document.getElementById("badge-tipo").textContent = textosTipo[incidencia.tipo] || incidencia.tipo;

      // Badge de estado
      var badgeEstado = document.getElementById("badge-estado");
      badgeEstado.className   = "badge-estado " + claseBadgePor(incidencia.estado);
      badgeEstado.textContent = textoBadgePor(incidencia.estado);

      // Estado actual en el panel lateral
      document.getElementById("estado-actual-texto").innerHTML =
        '<span class="badge-estado badge-estado-grande ' + claseBadgePor(incidencia.estado) + '">' +
          textoBadgePor(incidencia.estado) +
        '</span>';

      // Panel de cambio, solo para admin o directivo
      if (esAdmin || esDirectivo) {
        document.getElementById("panel-cambiar-estado").style.display = "block";
        document.getElementById("select-nuevo-estado").value = incidencia.estado;
      }
    }

    // Actualiza el estado en memoria y refresca los badges sin recargar
    function guardarEstado() {
      var nuevoEstado = document.getElementById("select-nuevo-estado").value;
      incidencia.estado = nuevoEstado;

      var badgeEstado = document.getElementById("badge-estado");
      badgeEstado.className   = "badge-estado " + claseBadgePor(nuevoEstado);
      badgeEstado.textContent = textoBadgePor(nuevoEstado);

      document.getElementById("estado-actual-texto").innerHTML =
        '<span class="badge-estado badge-estado-grande ' + claseBadgePor(nuevoEstado) + '">' +
          textoBadgePor(nuevoEstado) +
        '</span>';

      alert("Estado actualizado a: " + textoBadgePor(nuevoEstado));
    }
  </script>

</body>
</html>
